table:
  name: audio_tracks
  schema: video
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: audio_tracks
  custom_root_fields: {}
object_relationships:
  - name: project
    using:
      foreign_key_constraint_on: project_id
insert_permissions:
  - role: org-editor
    permission:
      check:
        project:
          org:
            memberships:
              _and:
                - role:
                    _in:
                      - admin
                      - editor
                - user_id:
                    _eq: X-Hasura-User-Id
      set:
        creator_id: x-hasura-user-id
      columns:
        - bytesize
        - channel_count
        - codec
        - complete
        - duration_ms
        - format
        - id
        - next_byte
        - original_container_id
        - project_id
        - remote_uri
        - samplerate
    comment: ""
select_permissions:
  - role: org-editor
    permission:
      columns:
        - complete
        - bytesize
        - channel_count
        - duration_ms
        - next_byte
        - samplerate
        - codec
        - format
        - creator_id
        - id
        - project_id
        - original_container_id
      filter:
        project:
          org:
            memberships:
              _and:
                - role:
                    _in:
                      - admin
                      - editor
                - user_id:
                    _eq: X-Hasura-User-Id
    comment: Required permission to allow insert_one
  - role: org-reader
    permission:
      columns:
        - complete
        - bytesize
        - channel_count
        - duration_ms
        - next_byte
        - samplerate
        - codec
        - format
        - creator_id
        - id
        - project_id
        - original_container_id
      filter:
        project:
          org:
            memberships:
              user_id:
                _eq: X-Hasura-User-Id
    comment: ""
