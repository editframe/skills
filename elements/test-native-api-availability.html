<!DOCTYPE html>
<html>
<head>
  <title>Native Canvas API Availability Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
      max-width: 900px;
      margin: 0 auto;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      background: #2a2a2a;
      border-radius: 8px;
      border-left: 4px solid #4a4a4a;
    }
    .section.success { border-left-color: #4caf50; }
    .section.error { border-left-color: #f44336; }
    .section.warning { border-left-color: #ff9800; }
    .section.info { border-left-color: #2196f3; }
    
    h1 { color: #fff; margin-top: 0; }
    h2 { color: #fff; margin-top: 0; font-size: 1.2em; }
    .result {
      margin: 8px 0;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
    }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .warning { color: #ff9800; }
    .info { color: #2196f3; }
    code {
      background: rgba(0,0,0,0.5);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }
    .instructions {
      background: #1e3a5f;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .instructions ol {
      margin: 10px 0;
      padding-left: 20px;
    }
    .instructions li {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <h1>🔍 Native Canvas API Availability Diagnostic</h1>
  <div id="results"></div>
  
  <script>
    const results = document.getElementById('results');
    
    function log(message, type = 'info', section = null) {
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.textContent = message;
      if (section) {
        section.appendChild(div);
      } else {
        results.appendChild(div);
      }
    }
    
    function createSection(title, className = 'info') {
      const section = document.createElement('div');
      section.className = `section ${className}`;
      const h2 = document.createElement('h2');
      h2.textContent = title;
      section.appendChild(h2);
      results.appendChild(section);
      return section;
    }
    
    // Test 1: Basic API Detection
    const test1 = createSection('Test 1: Basic API Detection', 'info');
    log('Checking if drawElementImage exists on CanvasRenderingContext2D...', 'info', test1);
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    if (!ctx) {
      log('❌ ERROR: Could not get 2D context', 'error', test1);
    } else {
      log('✅ SUCCESS: Got 2D context', 'success', test1);
      
      const hasDrawElementImage = 'drawElementImage' in ctx;
      if (hasDrawElementImage) {
        log('✅ SUCCESS: drawElementImage exists on context!', 'success', test1);
        log(`   Type: ${typeof ctx.drawElementImage}`, 'info', test1);
      } else {
        log('❌ ERROR: drawElementImage does NOT exist on context', 'error', test1);
        log('   This means the native API is not available in this browser.', 'warning', test1);
      }
    }
    
    // Test 2: Functional Test
    const test2 = createSection('Test 2: Functional Test', hasDrawElementImage ? 'info' : 'warning');
    log('Attempting to call drawElementImage with proper setup...', 'info', test2);
    
    try {
      const testCanvas = document.createElement('canvas');
      testCanvas.width = 200;
      testCanvas.height = 200;
      testCanvas.setAttribute('layoutsubtree', '');
      
      const testDiv = document.createElement('div');
      testDiv.textContent = 'Test Content';
      testDiv.style.cssText = 'position:absolute;width:100px;height:50px;background:blue;color:white;padding:10px;';
      testCanvas.appendChild(testDiv);
      document.body.appendChild(testCanvas);
      
      // Force layout
      void testCanvas.offsetHeight;
      void testDiv.offsetHeight;
      
      const testCtx = testCanvas.getContext('2d');
      if (typeof testCtx.drawElementImage === 'function') {
        testCtx.drawElementImage(testDiv, 0, 0);
        log('✅ SUCCESS: drawElementImage callable and executed without error', 'success', test2);
        
        // Check if content was actually drawn
        const imageData = testCtx.getImageData(10, 10, 1, 1);
        const hasContent = imageData.data[3] > 0; // Check alpha channel
        if (hasContent) {
          log('✅ SUCCESS: Content was actually drawn to canvas', 'success', test2);
        } else {
          log('⚠️ WARNING: Function exists but may not have drawn content', 'warning', test2);
        }
      } else {
        log('❌ ERROR: drawElementImage is not a function', 'error', test2);
        log(`   Actual type: ${typeof testCtx.drawElementImage}`, 'error', test2);
      }
      
      document.body.removeChild(testCanvas);
    } catch (err) {
      log(`❌ ERROR calling drawElementImage: ${err.message}`, 'error', test2);
      log(`   Stack: ${err.stack}`, 'error', test2);
    }
    
    // Test 3: Browser Information
    const test3 = createSection('Test 3: Browser Information', 'info');
    const ua = navigator.userAgent;
    log(`User Agent: ${ua}`, 'info', test3);
    
    // Detect browser
    let browser = 'Unknown';
    let version = 'Unknown';
    if (ua.includes('Chrome') && !ua.includes('Edg')) {
      browser = 'Chrome';
      const match = ua.match(/Chrome\/(\d+)/);
      version = match ? match[1] : 'Unknown';
    } else if (ua.includes('Firefox')) {
      browser = 'Firefox';
      const match = ua.match(/Firefox\/(\d+)/);
      version = match ? match[1] : 'Unknown';
    } else if (ua.includes('Safari') && !ua.includes('Chrome')) {
      browser = 'Safari';
      const match = ua.match(/Version\/(\d+)/);
      version = match ? match[1] : 'Unknown';
    } else if (ua.includes('Edg')) {
      browser = 'Edge';
      const match = ua.match(/Edg\/(\d+)/);
      version = match ? match[1] : 'Unknown';
    }
    
    log(`Browser: ${browser} ${version}`, 'info', test3);
    
    if (browser === 'Chrome') {
      const chromeVersion = parseInt(version);
      if (chromeVersion >= 120) {
        log('✅ Chrome version may support experimental APIs', 'success', test3);
      } else {
        log('⚠️ Older Chrome version - may need Chrome Canary for experimental APIs', 'warning', test3);
      }
    } else {
      log('⚠️ Native API is Chrome-specific (experimental)', 'warning', test3);
    }
    
    // Test 4: Current Code Detection
    const test4 = createSection('Test 4: Simulated isNativeCanvasApiAvailable()', 'info');
    log('Simulating the actual detection code from previewSettings.ts...', 'info', test4);
    
    // Simulate the actual detection logic
    let _nativeApiAvailable = null;
    function isNativeCanvasApiAvailable() {
      if (_nativeApiAvailable === null) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        _nativeApiAvailable = ctx !== null && "drawElementImage" in ctx;
      }
      return _nativeApiAvailable;
    }
    
    const detected = isNativeCanvasApiAvailable();
    if (detected) {
      log('✅ Detection returns: AVAILABLE', 'success', test4);
    } else {
      log('❌ Detection returns: NOT AVAILABLE', 'error', test4);
    }
    
    // Test 5: Performance Comparison Info
    const test5 = createSection('Test 5: Performance Information', 'info');
    log('Based on profiling data:', 'info', test5);
    log('  • Native API: ~1.76x faster than foreignObject', 'success', test5);
    log('  • Native API avoids: SVG serialization, image encoding, image loading', 'info', test5);
    log('  • Native API benefits: Direct DOM-to-canvas rendering, no tainting', 'info', test5);
    
    // Summary
    const summary = createSection('Summary & Recommendations', hasDrawElementImage ? 'success' : 'warning');
    
    if (hasDrawElementImage) {
      log('✅ NATIVE API IS AVAILABLE!', 'success', summary);
      log('   You can use the native rendering path for better performance.', 'success', summary);
      log('   The code will automatically detect and use it.', 'info', summary);
    } else {
      log('❌ NATIVE API IS NOT AVAILABLE', 'error', summary);
      log('   The code will fall back to foreignObject serialization.', 'info', summary);
      
      const instructions = document.createElement('div');
      instructions.className = 'instructions';
      instructions.innerHTML = `
        <h3>How to Enable Native API (Chrome Only):</h3>
        <ol>
          <li>Install <strong>Chrome Canary</strong> (experimental version)</li>
          <li>Open <code>chrome://flags</code> in the address bar</li>
          <li>Search for <code>canvas-draw-element</code></li>
          <li>Enable the flag</li>
          <li>Restart Chrome Canary</li>
          <li>Reload this page to verify</li>
        </ol>
        <p><strong>Note:</strong> This is an experimental API and may not be stable. Use at your own risk.</p>
      `;
      summary.appendChild(instructions);
    }
    
    // Risks/Downsides
    const risks = createSection('Risks & Downsides', 'warning');
    log('⚠️ Experimental API - may change or be removed', 'warning', risks);
    log('⚠️ Chrome-only - not available in Firefox, Safari, or Edge', 'warning', risks);
    log('⚠️ Requires Chrome Canary + experimental flag', 'warning', risks);
    log('⚠️ May have bugs or limitations not present in foreignObject path', 'warning', risks);
    log('✅ Code has proper fallback - will use foreignObject if native unavailable', 'success', risks);
  </script>
</body>
</html>
