services:
  postgres:
    image: postgres:16.1-alpine
    volumes:
      - ${TELECINE_ROOT_HOST:-${PWD}}/services/dev-postgres/create-databases.sh:/docker-entrypoint-initdb.d/create-databases.sh
      - /var/lib/postgresql/data
    env_file:
      - ${PWD}/.env
    # No direct port mapping - accessed via Traefik TCP routing
    expose:
      - "5432"
    networks:
      - default
      - traefik-shared
    # These configurtion options are for development only, and should not be used in production.
    # They trade off durability for performance, and WILL LOSE/CORRUPT DATA in the event of a crash.
    # prettier-ignore
    command: [ "postgres", "-c", "fsync=off", "-c", "full_page_writes=off", "-c", "synchronous_commit=off", "-c", "temp_tablespaces='/dev/shm'" ]
    labels:
      - traefik.enable=true
      # TCP routing by domain (requires TLS/SNI for domain-based routing)
      - traefik.tcp.routers.postgres.rule=HostSNI(`postgres.${WORKTREE_DOMAIN:-localhost}`)
      - traefik.tcp.routers.postgres.entrypoints=postgres
      - traefik.tcp.services.postgres.loadbalancer.server.port=5432
