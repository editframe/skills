services:
  web:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    environment:
      - OTEL_SERVICE_NAME="web"
      - DISABLE_RATE_LIMITING=${DISABLE_RATE_LIMITING:-}
      - VITE_HMR_HOST=${WORKTREE_DOMAIN:-localhost}
      - VITE_WEB_HOST=http://${WORKTREE_DOMAIN:-localhost}:3000
      - WEB_HOST=http://${WORKTREE_DOMAIN:-localhost}:3000
      # Use worktree domain in URL - custom fetch will rewrite to Traefik service
      # Traefik routes based on Host header, which we set via custom fetch
      - HASURA_SERVER_URL=http://${WORKTREE_DOMAIN:-localhost}:3000/v1/graphql
      - HASURA_SERVER_HOST=${WORKTREE_DOMAIN:-localhost}
    working_dir: /app
    volumes_from:
      - runner
    #  Layering a volume over the render diretory hides the render directory. This fixes some unfortunate reload behaviors with vite.
    volumes:
      - /app/services/render
    stop_grace_period: 1s
    networks:
      - default
      - traefik-shared

    # prettier-ignore
    command: ["node", "/app/services/web/server.js"]
    depends_on:
      - runner
      - graphql-engine
    labels:
      traefik.enable: true

      traefik.http.routers.web-${WORKTREE_ID:-main}.rule: "Host(`${WORKTREE_DOMAIN:-localhost}`) || Host(`host.docker.internal`)"
      traefik.http.routers.web-${WORKTREE_ID:-main}.entrypoints: web
      traefik.http.routers.web-${WORKTREE_ID:-main}.service: web-${WORKTREE_ID:-main}
      traefik.http.routers.web-${WORKTREE_ID:-main}.priority: 1
      traefik.http.services.web-${WORKTREE_ID:-main}.loadbalancer.server.port: 3000

      traefik.http.routers.web24678-${WORKTREE_ID:-main}.rule: Host(`${WORKTREE_DOMAIN:-localhost}`)
      traefik.http.routers.web24678-${WORKTREE_ID:-main}.entrypoints: port24678
      traefik.http.routers.web24678-${WORKTREE_ID:-main}.service: web24678-${WORKTREE_ID:-main}
      traefik.http.services.web24678-${WORKTREE_ID:-main}.loadbalancer.server.port: 24678

      traefik.http.routers.web3001-${WORKTREE_ID:-main}.rule: Host(`${WORKTREE_DOMAIN:-localhost}`)
      traefik.http.routers.web3001-${WORKTREE_ID:-main}.entrypoints: port3001
      traefik.http.routers.web3001-${WORKTREE_ID:-main}.service: web3001-${WORKTREE_ID:-main}
      traefik.http.services.web3001-${WORKTREE_ID:-main}.loadbalancer.server.port: 3001


networks:
  traefik-shared:
    name: editframe-shared
    external: true
