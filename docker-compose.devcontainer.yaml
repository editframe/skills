version: '3.8'

# Dev Container Configuration
# This provides a development container environment that works with the worktree-aware setup.
# Services (postgres, valkey, etc.) are managed by telecine/scripts/docker-compose which
# handles worktree detection and isolation automatically.

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - ${HOME}/.config/gcloud:/home/vscode/.config/gcloud:ro
      # Mount Docker socket so devcontainer can run docker commands on host Docker daemon
      # This allows telecine/scripts/docker-compose to create containers on the host
      # Worktree isolation is handled via --project-name in docker-compose script
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount worktrees directory from host so Docker-in-docker can access worktree paths
      # Mount Cursor's default worktree location so Docker-in-docker can access worktree paths
      # Cursor creates worktrees in ~/.cursor/worktrees, mount it so host Docker can access
      - ${HOME}/.cursor/worktrees:/home/vscode/.cursor/worktrees
    working_dir: /workspace
    command: ["sleep", "infinity"]
    # Note: Services created by telecine/scripts/docker-compose run on the host Docker daemon
    # Each worktree gets isolated containers via --project-name (e.g., telecine-feature-auth)
    # Services are accessed via localhost port forwarding
    networks:
      - default

networks:
  default:
    driver: bridge

