services:
  scheduler-go:
    build:
      context: .
      dockerfile: services/scheduler-go/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ${PWD}/.env
    environment:
      - OTEL_SERVICE_NAME=scheduler-go
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tracing:4318
      - PORT=3000
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - PINO_LOG_LEVEL=debug
      - GOMEMLIMIT=${WORKER_SCHEDULER_GOMEMLIMIT:-115MiB}
    networks:
      - telecine_default
    labels:
      - traefik.enable=false
    deploy:
      resources:
        limits:
          cpus: ${WORKER_SCHEDULER_CPUS:-0.2}
          memory: ${WORKER_SCHEDULER_MEMORY:-128M}

  scheduler-go-test:
    build:
      context: .
      dockerfile: services/scheduler-go/Dockerfile.test
    working_dir: /app
    volumes:
      - ${TELECINE_ROOT_HOST:-${PWD}}/services/scheduler-go:/app
    env_file:
      - ${PWD}/.env
    environment:
      - OTEL_SERVICE_NAME=scheduler-go-tests
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tracing:4318
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=scheduler-go-tests
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - MEMORY_TEST_SCALE=100,500,1000
      - MEMORY_TEST_TOLERANCE=10
    networks:
      - telecine_default
    depends_on:
      - postgres
      - valkey
    labels:
      - traefik.enable=false
    profiles:
      - test

networks:
  telecine_default:
    external: true
