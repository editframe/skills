services:
  # PostgreSQL is now managed at the monorepo root level
  # See /docker-compose.yaml for the shared PostgreSQL configuration
  # 
  # This service definition is kept as a reference to the external postgres container
  # Services can still use the 'postgres' hostname - it will resolve to editframe-postgres
  # via the shared editframe-shared network
  
  # Worktrees connect to databases named: telecine-main, telecine-<branch-name>
  # Database is auto-created by scripts/create-worktree-database if it doesn't exist
