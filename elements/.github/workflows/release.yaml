name: Auto Release and Publish
run-name: ${{ github.actor }} is releasing ${{ github.ref_name }}
on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  prepare-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.15.0"
          registry-url: "https://registry.npmjs.org"

      - name: Create .env file
        run: touch .env

      - name: Build CI Runner
        run: ./scripts/docker-compose build ci-runner

      - name: Install Dependencies
        run: ./scripts/docker-compose run --rm ci-runner npm ci

      - name: Build All Packages
        run: ./scripts/build-all

      - name: Generate TypeDoc
        run: |
          ./scripts/docker-compose run --rm ci-runner npm run typedoc \
            --workspace @editframe/api \
            --workspace @editframe/react \
            --workspace @editframe/elements \
            --workspace @editframe/assets

      - name: Type Check
        if: "!contains(github.ref_name, 'beta')"
        run: ./scripts/docker-compose run --rm ci-runner npm run typecheck --workspaces

      - name: Lint
        run: ./scripts/docker-compose run --rm ci-runner npm run lint

      - name: Format Check
        run: ./scripts/docker-compose run --rm ci-runner npm run format

      - name: Run Node Tests
        if: "!contains(github.ref_name, 'beta')"
        run: ./scripts/docker-compose run --rm ci-runner npx vitest --config vitest.config.ts --run

      - name: Run Browser Tests
        if: "!contains(github.ref_name, 'beta')"
        run: ./scripts/docker-compose run --rm ci-runner npx vitest --config vitest.config.browser.ts --run

      - name: Publish to npm
        run: |
          # Get the current tag name from git
          TAG_NAME=$(git describe --tags --exact-match 2>/dev/null || echo "")

          # Determine npm tag based on tag name
          if [[ "$TAG_NAME" == *"beta"* ]]; then
              NPM_TAG="beta"
          else
              NPM_TAG="latest"
          fi

          echo "Publishing with npm tag: $NPM_TAG"
          npm publish --tag "$NPM_TAG" --provenance --access public --workspaces
        working-directory: ${{ github.workspace }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Automated release for tag ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          draft: false
