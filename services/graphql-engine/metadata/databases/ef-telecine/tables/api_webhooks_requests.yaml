table:
  name: webhooks_requests
  schema: api
object_relationships:
  - name: api_key
    using:
      foreign_key_constraint_on: api_key_id
  - name: org
    using:
      foreign_key_constraint_on: org_id
select_permissions:
  - role: org-admin
    permission:
      columns:
        - api_key_id
        - created_at
        - id
        - last_attempted_at
        - org_id
        - retry_count
        - status_code
        - topic
        - webhook_url
      filter:
        org:
          memberships:
            _and:
              - role:
                  _eq: admin
              - user_id:
                  _eq: X-Hasura-user-id
      allow_aggregations: true
    comment: ""
  - role: org-reader
    permission:
      columns:
        - api_key_id
        - created_at
        - last_attempted_at
        - org_id
        - retry_count
        - status_code
        - topic
        - webhook_url
      filter:
        org:
          memberships:
            _and:
              - role:
                  _eq: reader
              - user_id:
                  _eq: X-Hasura-user-id
    comment: ""
