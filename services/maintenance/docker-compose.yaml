services:
  maintenance:
    image: telecine-runner
    pull_policy: never
    depends_on:
      - runner
    working_dir: /app
    env_file:
      - ${PWD}/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 3s
      timeout: 1s
      retries: 3
      start_period: 20s
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=maintenance
      - POSTGRES_HOST=editframe-postgres
    volumes_from:
      - runner
    stop_grace_period: 1s
    init: true
    scale: 1
    # prettier-ignore
    command: ["tsx", "--watch", "/app/services/maintenance/server.ts"]
    restart: unless-stopped
    networks:
      - default
      - editframe-shared
    deploy:
      resources:
        limits:
          cpus: ${MAINTENANCE_CPUS:-0.2}
          memory: ${MAINTENANCE_MEMORY:-256M}

networks:
  editframe-shared:
    name: editframe-shared
    external: true
