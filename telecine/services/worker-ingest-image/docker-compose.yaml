services:
  worker-ingest-image:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-ingest-image
      - WORKER_MODE=websocket
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command: ["tsx", "--watch", "/app/services/worker-ingest-image/server.ts"]
    networks:
      - default
      - editframe-shared
    deploy:
      resources:
        limits:
          cpus: ${WORKER_INGEST_IMAGE_CPUS:-1}
          memory: ${WORKER_INGEST_IMAGE_MEMORY:-1G}

networks:
  editframe-shared:
    name: editframe-shared
    external: true
