services:
  traefik:
    image: traefik:latest
    ports:
      - "7777:7777"
      - "3000:3000"
      - "24678:24678"
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --api.insecure=true
      - --providers.docker
      - --entrypoints.web.address=:3000
      - --entrypoints.traefik.address=:7777
      - --entrypoints.port24678.address=:24678
      - --entrypoints.port3001.address=:3001
      - --log.level=INFO
      - --accesslog

  # autoheal:
  #   environment:
  #     AUTOHEAL_CONTAINER_LABEL: autoheal
  #   image: willfarrell/autoheal:latest
  #   network_mode: none
  #   restart: unless-stopped
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - /var/run/docker.sock:/var/run/docker.sock

  devcontainer:
    build:
      context: .
      args:
        NODE_VERSION: 22
      dockerfile_inline: |
        FROM node:22
        RUN apt-get update && apt-get install -y \
            zsh \
            && rm -rf /var/lib/apt/lists/*

        # Install tsx globally for running TypeScript files
        RUN npm install -g tsx

        SHELL ["/bin/zsh", "-c"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ../elements:/app/lib/packages
    env_file:
      - ${PWD}/.env
    working_dir: /app
    stop_grace_period: 1s
    command: ["sleep", "infinity"]
    labels:
      - traefik.enable=false

  runner:
    build:
      context: ./
      dockerfile: Dockerfile.runner
      tags:
        - telecine-runner
    env_file:
      - ${PWD}/.env
    restart: no
    environment:
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ../elements:/app/lib/packages
    devices:
      - /dev/mps0:/dev/mps0
    privileged: true
    stop_grace_period: 1s
    command: ["sleep", "infinity"]
    labels:
      - traefik.enable=false

  # playwright-runner:
