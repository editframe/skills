table:
  name: users
  schema: identity
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: users
  custom_root_fields: {}
array_relationships:
  - name: email_confirmations
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: email_confirmations
          schema: identity
  - name: email_passwords
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: email_passwords
          schema: identity
  - name: images
    using:
      foreign_key_constraint_on:
        column: creator_id
        table:
          name: images
          schema: video
  - name: invites
    using:
      foreign_key_constraint_on:
        column: creator_id
        table:
          name: invites
          schema: identity
  - name: memberships
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: memberships
          schema: identity
  - name: password_resets
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: password_resets
          schema: identity
  - name: primary_orgs
    using:
      foreign_key_constraint_on:
        column: primary_user_id
        table:
          name: orgs
          schema: identity
  - name: projects
    using:
      foreign_key_constraint_on:
        column: creator_id
        table:
          name: projects
          schema: video
select_permissions:
  - role: ef-admin
    permission:
      columns:
        - metadata
        - first_name
        - last_name
        - referral
        - created_at
        - updated_at
        - id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: org-admin
    permission:
      columns:
        - created_at
        - first_name
        - id
        - last_name
        - updated_at
      filter: {}
    comment: ""
  - role: org-reader
    permission:
      columns:
        - id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - first_name
        - id
        - last_name
        - metadata
        - referral
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - first_name
        - last_name
        - metadata
        - referral
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: null
    comment: ""
