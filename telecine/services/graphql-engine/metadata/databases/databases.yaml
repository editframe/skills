- name: ef-telecine
  kind: postgres
  configuration:
    connection_info:
      database_url:
        from_env: PG_DATABASE_URL
      isolation_level: read-committed
      use_prepared_statements: false
  logical_models:
    - fields:
        - name: id
          type:
            nullable: false
            scalar: uuid
        - name: accepted_at
          type:
            nullable: true
            scalar: timestamptz
        - name: denied_at
          type:
            nullable: true
            scalar: timestamptz
        - name: from_display
          type:
            nullable: false
            scalar: text
        - name: org_display
          type:
            nullable: false
            scalar: text
        - name: role
          type:
            nullable: false
            scalar: text
        - name: invitee_email_address
          type:
            nullable: false
            scalar: text
        - name: invitee_id
          type:
            nullable: true
            scalar: uuid
        - name: org_id
          type:
            nullable: true
            scalar: uuid
      name: invite_for_view
      select_permissions:
        - permission:
            columns:
              - id
              - accepted_at
              - denied_at
              - from_display
              - org_display
              - role
              - invitee_email_address
              - invitee_id
              - org_id
            filter: {}
          role: anonymous
  native_queries:
    - arguments:
        invite_token:
          description: ""
          nullable: false
          type: uuid
      code: |-
        select
        i.id,
        i.accepted_at,
        i.denied_at,
        i.role,
        ep.email_address as from_display,
        o.display_name as org_display,
        o.id as org_id,
        i.email_address as invitee_email_address,
        invitee.id as invitee_id

        from identity.invites i
        join identity.orgs o on i.org_id=o.id
        join identity.users u on i.creator_id=u.id
        join identity.email_passwords ep on u.id=ep.user_id
        left join identity.email_passwords invitee_ep on invitee_ep.email_address=i.email_address
        left join identity.users invitee on invitee.id=invitee_ep.user_id
        where i.invite_token={{invite_token}};
      returns: invite_for_view
      root_field_name: invites_for_display
  tables: "!include ef-telecine/tables/tables.yaml"
