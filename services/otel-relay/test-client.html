<!DOCTYPE html>
<html>

<head>
  <title>OTEL Relay - Performance Panel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'SF Pro Text', -apple-system, system-ui, sans-serif;
      background: #242424;
      color: #cccccc;
      font-size: 11px;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: #1e1e1e;
      border-bottom: 1px solid #3c3c3c;
      height: 36px;
    }

    .toolbar-left {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status {
      padding: 3px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 500;
    }

    .connected {
      background: #0e4429;
      color: #3fb950;
    }

    .disconnected {
      background: #4c1d1d;
      color: #f85149;
    }

    .connecting {
      background: #4d3800;
      color: #f0cc6d;
    }

    button {
      background: #2d2d30;
      color: #cccccc;
      border: 1px solid #3c3c3c;
      padding: 4px 10px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
    }

    button:hover {
      background: #3c3c3c;
    }

    .content {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 36px);
    }

    .trace-list {
      flex: 0 0 auto;
      max-height: 150px;
      overflow-y: auto;
      border-bottom: 1px solid #3c3c3c;
      background: #1e1e1e;
    }

    .trace-item {
      padding: 4px 12px;
      border-bottom: 1px solid #2d2d2d;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      justify-content: space-between;
    }

    .trace-item:hover {
      background: #2d2d2d;
    }

    .trace-item.selected {
      background: #094771;
      border-left: 2px solid #0078d4;
    }

    .flame-chart {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: #242424;
      position: relative;
    }

    .timeline-header {
      position: sticky;
      top: 0;
      height: 20px;
      background: #1e1e1e;
      border-bottom: 1px solid #3c3c3c;
      z-index: 10;
      display: flex;
      padding-left: 200px;
    }

    .timeline-tick {
      position: absolute;
      font-size: 9px;
      color: #858585;
      top: 2px;
    }

    .span-row {
      height: 18px;
      position: relative;
      border-bottom: 1px solid #2d2d2d;
      display: flex;
      align-items: center;
    }

    .span-row:hover {
      background: #2d2d2d;
    }

    .span-label {
      width: 200px;
      flex-shrink: 0;
      padding: 0 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
      color: #cccccc;
      border-right: 1px solid #3c3c3c;
    }

    .span-chart {
      flex: 1;
      position: relative;
      height: 100%;
    }

    .span-bar {
      position: absolute;
      height: 14px;
      top: 2px;
      border-radius: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0 4px;
      font-size: 9px;
      color: white;
      overflow: hidden;
      white-space: nowrap;
    }

    .span-bar:hover {
      filter: brightness(1.2);
      outline: 1px solid rgba(255, 255, 255, 0.3);
    }

    .span-bar.level-0 {
      background: #0078d4;
    }

    .span-bar.level-1 {
      background: #00a4a6;
    }

    .span-bar.level-2 {
      background: #8764b8;
    }

    .span-bar.level-3 {
      background: #9d5a00;
    }

    .span-bar.level-4 {
      background: #e81123;
    }

    .span-bar.level-5 {
      background: #107c10;
    }

    .span-bar.error {
      background: #e81123 !important;
    }

    .span-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .details-panel {
      position: fixed;
      right: 0;
      top: 36px;
      width: 300px;
      height: calc(100vh - 36px);
      background: #1e1e1e;
      border-left: 1px solid #3c3c3c;
      padding: 12px;
      overflow-y: auto;
      display: none;
    }

    .details-panel.visible {
      display: block;
    }

    .detail-section {
      margin-bottom: 12px;
    }

    .detail-title {
      font-size: 10px;
      color: #858585;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .detail-value {
      font-size: 11px;
      color: #cccccc;
      word-break: break-all;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 10px;
    }

    .detail-key {
      color: #858585;
    }

    .detail-val {
      color: #cccccc;
      text-align: right;
    }

    .no-data {
      padding: 40px;
      text-align: center;
      color: #858585;
    }

    .indent-0 {
      padding-left: 0px;
    }

    .indent-1 {
      padding-left: 12px;
    }

    .indent-2 {
      padding-left: 24px;
    }

    .indent-3 {
      padding-left: 36px;
    }

    .indent-4 {
      padding-left: 48px;
    }

    .indent-5 {
      padding-left: 60px;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <div id="status" class="status connecting">Connecting...</div>
      <span id="count" style="font-size: 10px; color: #858585;">0 spans</span>
    </div>
    <button onclick="clearData()">Clear</button>
  </div>

  <div class="content">
    <div class="trace-list" id="traceList"></div>
    <div class="flame-chart" id="flameChart"></div>
  </div>

  <div class="details-panel" id="detailsPanel"></div>

  <script>
    const traceListDiv = document.getElementById('traceList');
    const flameChartDiv = document.getElementById('flameChart');
    const detailsPanelDiv = document.getElementById('detailsPanel');
    const statusDiv = document.getElementById('status');
    const countSpan = document.getElementById('count');

    const spans = new Map();
    let totalSpanCount = 0;
    let selectedTrace = null;
    let selectedSpan = null;

    function updateStatus(state, message) {
      statusDiv.className = `status ${state}`;
      statusDiv.textContent = message;
    }

    function clearData() {
      spans.clear();
      totalSpanCount = 0;
      selectedTrace = null;
      selectedSpan = null;
      render();
    }

    function formatDuration(nanos) {
      const ms = nanos / 1_000_000;
      if (ms < 1) return `${(nanos / 1000).toFixed(0)}µs`;
      if (ms < 1000) return `${ms.toFixed(2)}ms`;
      return `${(ms / 1000).toFixed(2)}s`;
    }

    function processTraceEvent(traceData) {
      if (!traceData.resourceSpans) return;

      for (const resourceSpan of traceData.resourceSpans) {
        const serviceName = resourceSpan.resource?.attributes?.find(a => a.key === 'service.name')?.value?.stringValue || 'unknown';

        for (const scopeSpan of resourceSpan.scopeSpans || []) {
          for (const span of scopeSpan.spans || []) {
            const spanId = span.spanId;
            const traceId = span.traceId;
            const parentSpanId = span.parentSpanId || null;
            const name = span.name;
            const startTime = BigInt(span.startTimeUnixNano || 0);
            const endTime = BigInt(span.endTimeUnixNano || 0);
            const duration = endTime - startTime;
            const isError = span.status?.code === 2;

            spans.set(spanId, {
              spanId,
              traceId,
              parentSpanId,
              name,
              startTime,
              endTime,
              duration,
              serviceName,
              attributes: span.attributes || [],
              isError,
            });
            totalSpanCount++;
          }
        }
      }
    }

    function buildTraceTree() {
      const traces = new Map();

      for (const span of spans.values()) {
        if (!traces.has(span.traceId)) {
          traces.set(span.traceId, { spans: [], minTime: span.startTime, maxTime: span.endTime });
        }
        const trace = traces.get(span.traceId);
        trace.spans.push(span);
        if (span.startTime < trace.minTime) trace.minTime = span.startTime;
        if (span.endTime > trace.maxTime) trace.maxTime = span.endTime;
      }

      const result = [];
      for (const [traceId, trace] of traces.entries()) {
        const rootSpans = trace.spans.filter(s => !s.parentSpanId || !spans.has(s.parentSpanId));
        result.push({
          traceId,
          rootSpans,
          allSpans: trace.spans,
          minTime: trace.minTime,
          maxTime: trace.maxTime,
          duration: trace.maxTime - trace.minTime,
        });
      }

      return result.sort((a, b) => Number(b.minTime - a.minTime));
    }

    function flattenSpans(rootSpans, allSpans, depth = 0) {
      const result = [];
      const spanMap = new Map(allSpans.map(s => [s.spanId, s]));

      const processSpan = (span, level) => {
        result.push({ ...span, level });
        const children = allSpans.filter(s => s.parentSpanId === span.spanId).sort((a, b) => Number(a.startTime - b.startTime));
        children.forEach(child => processSpan(child, level + 1));
      };

      rootSpans.forEach(root => processSpan(root, depth));
      return result;
    }

    function renderTimeline(traceDuration) {
      const durationMs = Number(traceDuration) / 1_000_000;
      const ticks = [];
      let tickInterval = 1;

      if (durationMs > 10000) tickInterval = 1000;
      else if (durationMs > 1000) tickInterval = 100;
      else if (durationMs > 100) tickInterval = 10;

      for (let t = 0; t <= durationMs; t += tickInterval) {
        const percent = (t / durationMs) * 100;
        ticks.push(`<div class="timeline-tick" style="left: ${percent}%">${t}ms</div>`);
      }

      return `<div class="timeline-header">${ticks.join('')}</div>`;
    }

    function renderFlameChart(trace) {
      const flatSpans = flattenSpans(trace.rootSpans, trace.allSpans);

      let html = renderTimeline(trace.duration);

      flatSpans.forEach(span => {
        const relativeStart = Number(span.startTime - trace.minTime) / Number(trace.duration) * 100;
        const relativeWidth = Math.max(0.1, Number(span.duration) / Number(trace.duration) * 100);
        const levelClass = `level-${span.level % 6}`;
        const errorClass = span.isError ? ' error' : '';
        const indentClass = `indent-${Math.min(span.level, 5)}`;

        html += `
          <div class="span-row">
            <div class="span-label ${indentClass}" title="${span.name}">${span.name}</div>
            <div class="span-chart">
              <div class="span-bar ${levelClass}${errorClass}" 
                   style="left: ${relativeStart}%; width: ${relativeWidth}%;"
                   onclick="showDetails('${span.spanId}')"
                   title="${span.name} - ${formatDuration(Number(span.duration))}">
                <span class="span-text">${formatDuration(Number(span.duration))}</span>
              </div>
            </div>
          </div>
        `;
      });

      return html;
    }

    function render() {
      const traces = buildTraceTree();

      if (traces.length === 0) {
        traceListDiv.innerHTML = '<div class="no-data" style="padding: 20px;">No traces yet</div>';
        flameChartDiv.innerHTML = '<div class="no-data">Select a trace</div>';
        countSpan.textContent = '0 spans';
        return;
      }

      countSpan.textContent = `${totalSpanCount} spans • ${traces.length} traces`;

      traceListDiv.innerHTML = traces.slice(0, 50).map(trace => {
        const traceShort = trace.traceId.substring(0, 16);
        const selected = selectedTrace === trace.traceId ? ' selected' : '';
        return `
          <div class="trace-item${selected}" onclick="selectTrace('${trace.traceId}')">
            <span>${traceShort}</span>
            <span style="color: #858585;">${trace.allSpans.length} spans • ${formatDuration(Number(trace.duration))}</span>
          </div>
        `;
      }).join('');

      if (selectedTrace) {
        const trace = traces.find(t => t.traceId === selectedTrace) || traces[0];
        if (trace) {
          flameChartDiv.innerHTML = renderFlameChart(trace);
        }
      } else if (traces.length > 0) {
        selectedTrace = traces[0].traceId;
        flameChartDiv.innerHTML = renderFlameChart(traces[0]);
      }
    }

    window.selectTrace = function (traceId) {
      selectedTrace = traceId;
      render();
    };

    window.showDetails = function (spanId) {
      const span = spans.get(spanId);
      if (!span) return;

      selectedSpan = spanId;

      const attrs = span.attributes.map(attr => {
        const value = attr.value.stringValue || attr.value.intValue || attr.value.boolValue || JSON.stringify(attr.value);
        return `
          <div class="detail-row">
            <span class="detail-key">${attr.key}</span>
            <span class="detail-val">${value}</span>
          </div>
        `;
      }).join('');

      detailsPanelDiv.innerHTML = `
        <div class="detail-section">
          <div class="detail-title">Span</div>
          <div class="detail-value">${span.name}</div>
        </div>
        <div class="detail-section">
          <div class="detail-row">
            <span class="detail-key">Duration</span>
            <span class="detail-val">${formatDuration(Number(span.duration))}</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">Service</span>
            <span class="detail-val">${span.serviceName}</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">Span ID</span>
            <span class="detail-val">${span.spanId}</span>
          </div>
        </div>
        ${attrs ? `
          <div class="detail-section">
            <div class="detail-title">Attributes</div>
            ${attrs}
          </div>
        ` : ''}
      `;
      detailsPanelDiv.className = 'details-panel visible';
    };

    function handleEvent(data) {
      const parsed = JSON.parse(data);

      if (parsed.type === 'trace') {
        processTraceEvent(parsed.data);
        render();
      }
    }

    function connect() {
      const eventSource = new EventSource('http://localhost:4319/events');

      eventSource.onopen = () => {
        updateStatus('connected', 'Connected');
      };

      eventSource.onmessage = (event) => {
        handleEvent(event.data);
      };

      eventSource.onerror = (error) => {
        updateStatus('disconnected', 'Disconnected');
        eventSource.close();
        setTimeout(connect, 3000);
      };
    }

    connect();
    render();
  </script>
</body>

</html>
