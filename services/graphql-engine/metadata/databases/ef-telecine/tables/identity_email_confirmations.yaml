table:
  name: email_confirmations
  schema: identity
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: email_confirmations
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - user_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - confirmed_at
        - created_at
        - id
        - updated_at
        - user_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      limit: 50
    comment: ""
event_triggers:
  - name: email_confirmations_email
    definition:
      enable_manual: true
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 30
      num_retries: 1
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/deliver_confirmation_email'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
