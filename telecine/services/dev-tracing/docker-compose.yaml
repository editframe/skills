services:
  tracing:
    build:
      context: ./services/otel-relay
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WORKTREE_TRACING_GRPC_PORT:-4317}:4317"
      - "${WORKTREE_TRACING_HTTP_PORT:-4318}:4318"
      - "${WORKTREE_TRACING_SSE_PORT:-4319}:4319"
    environment:
      - OTEL_GRPC_PORT=4317
      - OTEL_HTTP_PORT=4318
      - SSE_PORT=4319
      - BUFFER_SIZE=50000
    labels:
      - traefik.enable=true
      - traefik.http.routers.otel-relay-${WORKTREE_ID:-main}.rule=Host(`otel.${WORKTREE_DOMAIN:-localhost}`)
      - traefik.http.routers.otel-relay-${WORKTREE_ID:-main}.entrypoints=web
      - traefik.http.services.otel-relay-${WORKTREE_ID:-main}.loadbalancer.server.port=4319
    networks:
      - default
      - traefik-shared

networks:
  default:
    name: ${WORKTREE_DOCKER_NETWORK_NAME:-telecine_default}
  traefik-shared:
    name: telecine-traefik
    external: true
