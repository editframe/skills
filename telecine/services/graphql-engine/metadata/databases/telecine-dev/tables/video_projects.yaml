table:
  name: projects
  schema: video
object_relationships:
  - name: org
    using:
      foreign_key_constraint_on: org_id
  - name: user
    using:
      foreign_key_constraint_on: creator_id
array_relationships:
  - name: images
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: images
          schema: video
  - name: project_updates
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: project_updates
          schema: video
insert_permissions:
  - role: org-admin
    permission:
      check:
        org:
          memberships:
            _and:
              - role:
                  _eq: admin
              - user_id:
                  _eq: X-Hasura-User-Id
      set:
        creator_id: x-hasura-User-Id
      columns:
        - org_id
        - title
    comment: ""
  - role: org-editor
    permission:
      check:
        org:
          memberships:
            _and:
              - user_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _in:
                    - admin
                    - editor
      set:
        creator_id: x-hasura-User-Id
      columns:
        - org_id
        - title
    comment: ""
select_permissions:
  - role: org-admin
    permission:
      columns:
        - created_at
        - creator_id
        - id
        - org_id
        - title
        - updated_at
      filter:
        org:
          memberships:
            _and:
              - role:
                  _eq: admin
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-editor
    permission:
      columns:
        - title
        - created_at
        - updated_at
        - creator_id
        - id
        - org_id
      filter:
        org:
          memberships:
            _and:
              - user_id:
                  _eq: X-Hasura-User-Id
              - role:
                  _in:
                    - admin
                    - editor
    comment: ""
  - role: org-reader
    permission:
      columns:
        - title
        - created_at
        - updated_at
        - creator_id
        - id
        - org_id
      filter:
        org:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
    comment: ""
