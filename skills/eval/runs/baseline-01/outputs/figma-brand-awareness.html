<ef-configuration api-host="https://api.editframe.com" media-engine="local">
  <ef-timegroup mode="sequence" overlap="0.8s" class="w-[1080px] h-[1920px] bg-white">
    <!-- Scene 1: The Old Way (0-5s) -->
    <ef-timegroup mode="contain" class="absolute w-full h-full bg-gradient-to-br from-slate-100 to-slate-50"
      style="animation: 0.8s fade-out var(--ef-transition-out-start) both">
      <ef-text class="absolute top-1/4 left-8 right-8 text-slate-900 text-6xl font-bold text-center"
        style="animation: 0.6s enter-down 0.3s both">
        Design alone.
      </ef-text>
      <ef-text class="absolute top-2/3 left-8 right-8 text-slate-500 text-3xl text-center"
        style="animation: 0.6s enter-up 0.9s both">
        Files. Versions. Email.
      </ef-text>
      <div class="absolute bottom-16 left-1/2 transform -translate-x-1/2 w-32 h-32 rounded-lg bg-slate-300 opacity-40"
        style="animation: 0.8s scale-down 1.2s both"></div>
    </ef-timegroup>

    <!-- Scene 2: The Problem Emerges (5-10s) -->
    <ef-timegroup mode="contain" class="absolute w-full h-full bg-slate-900"
      style="animation: 0.8s fade-in both, 0.8s fade-out var(--ef-transition-out-start) both">
      <canvas id="chaos-canvas" class="absolute inset-0 size-full"></canvas>
      <ef-text class="absolute top-1/3 left-8 right-8 text-white text-5xl font-bold text-center z-10"
        style="animation: 0.6s enter-down 0.5s both">
        But teams need to work together.
      </ef-text>
      <script>
        const canvas = document.getElementById('chaos-canvas');
        const tg = canvas.closest('ef-timegroup');
        if (canvas && tg) {
          tg.initializer = (instance) => {
            return instance.addFrameTask((ms, duration) => {
              canvas.width = canvas.offsetWidth;
              canvas.height = canvas.offsetHeight;
              const progress = ms / duration;
              const ctx = canvas.getContext('2d');
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              
              const count = Math.floor(progress * 40);
              for (let i = 0; i < count; i++) {
                const seed = i * 97.3;
                const x = (Math.sin(seed) * 0.4 + 0.5) * canvas.width;
                const y = (Math.cos(seed * 0.7) * 0.3 + 0.5) * canvas.height;
                const vx = Math.sin(seed + ms * 0.001) * 200;
                const vy = Math.cos(seed * 0.5 + ms * 0.0008) * 200;
                
                ctx.strokeStyle = `rgba(139, 92, 246, ${0.3 + progress * 0.4})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + vx * 0.3, y + vy * 0.3);
                ctx.stroke();
              }
            });
          };
        }
      </script>
    </ef-timegroup>

    <!-- Scene 3: Enter Figma (10-16s) -->
    <ef-timegroup mode="contain" class="absolute w-full h-full bg-white"
      style="animation: 0.8s fade-in both, 0.8s fade-out var(--ef-transition-out-start) both">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-40 h-40 rounded-2xl bg-gradient-to-br from-purple-400 to-blue-500 flex items-center justify-center"
          style="animation: 0.8s scale-in 0.3s both">
          <span class="text-white text-6xl font-bold">F</span>
        </div>
      </div>
      <ef-text class="absolute bottom-32 left-8 right-8 text-slate-900 text-5xl font-bold text-center"
        style="animation: 0.6s enter-up 1s both">
        Design in the browser.
      </ef-text>
      <ef-text class="absolute bottom-16 left-8 right-8 text-purple-600 text-2xl text-center"
        style="animation: 0.6s enter-up 1.4s both">
        Together. Real-time.
      </ef-text>
    </ef-timegroup>

    <!-- Scene 4: Collaboration (16-22s) -->
    <ef-timegroup mode="contain" class="absolute w-full h-full bg-gradient-to-b from-white to-purple-50"
      style="animation: 0.8s fade-in both, 0.8s fade-out var(--ef-transition-out-start) both">
      <canvas id="collab-canvas" class="absolute inset-0 size-full"></canvas>
      <ef-text class="absolute top-20 left-8 right-8 text-slate-900 text-5xl font-bold text-center z-10"
        style="animation: 0.6s enter-down 0.3s both">
        Designers. Developers. PMs.
      </ef-text>
      <ef-text class="absolute bottom-24 left-8 right-8 text-slate-600 text-2xl text-center z-10"
        style="animation: 0.6s enter-up 0.8s both">
        One workspace. One truth.
      </ef-text>
      <script>
        const collabCanvas = document.getElementById('collab-canvas');
        const collabTg = collabCanvas.closest('ef-timegroup');
        if (collabCanvas && collabTg) {
          collabTg.initializer = (instance) => {
            return instance.addFrameTask((ms, duration) => {
              collabCanvas.width = collabCanvas.offsetWidth;
              collabCanvas.height = collabCanvas.offsetHeight;
              const progress = ms / duration;
              const ctx = collabCanvas.getContext('2d');
              ctx.clearRect(0, 0, collabCanvas.width, collabCanvas.height);
              
              const cx = collabCanvas.width / 2;
              const cy = collabCanvas.height / 2;
              const radius = 60 + progress * 40;
              const nodeCount = Math.floor(progress * 12) + 3;
              
              for (let i = 0; i < nodeCount; i++) {
                const angle = (i / nodeCount) * Math.PI * 2;
                const x = cx + Math.cos(angle) * radius;
                const y = cy + Math.sin(angle) * radius;
                const r = 6 + Math.sin(i * 0.7 + progress * Math.PI) * 3;
                
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(139, 92, 246, ${0.5 + progress * 0.3})`;
                ctx.fill();
                
                ctx.strokeStyle = `rgba(99, 102, 241, ${0.3 + progress * 0.2})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.stroke();
              }
            });
          };
        }
      </script>
    </ef-timegroup>

    <!-- Scene 5: The Promise (22-30s) -->
    <ef-timegroup mode="contain" class="absolute w-full h-full bg-gradient-to-br from-purple-600 to-blue-600"
      style="animation: 0.8s fade-in both">
      <ef-text split="word" class="absolute top-1/3 left-8 right-8 text-white text-6xl font-bold text-center"
        style="animation: 0.5s word-in both; animation-delay: calc(var(--ef-word-index) * 100ms)">
        Ship faster together.
      </ef-text>
      <ef-text class="absolute bottom-32 left-8 right-8 text-white/90 text-2xl text-center"
        style="animation: 0.6s enter-up 1.2s both">
        Figma. Design platform for everyone.
      </ef-text>
      <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-white rounded-full"
        style="animation: 0.6s scale-in 1.6s both">
        <span class="text-purple-600 font-bold text-lg">Try Free</span>
      </div>
    </ef-timegroup>
  </ef-timegroup>

  <style>
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes enter-down {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes enter-up {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes scale-in {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes scale-down {
      from { transform: scale(1); opacity: 0.6; }
      to { transform: scale(0.7); opacity: 0.2; }
    }
    @keyframes word-in {
      from { transform: translateY(20px) scale(0.92); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</ef-configuration>
