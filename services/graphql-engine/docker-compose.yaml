services:
  graphql-engine:
    image: hasura/graphql-engine:v2.36.0
    volumes:
      - ${TELECINE_ROOT_HOST:-${PWD}}/services/graphql-engine/metadata:/hasura-metadata
      - ${TELECINE_ROOT_HOST:-${PWD}}/services/graphql-engine/migrations:/hasura-migrations
    # ports:
      # - "8080:8080"
    env_file:
      - ${PWD}/.env
    environment:
      # Override database URLs to use shared PostgreSQL with worktree-specific database
      HASURA_GRAPHQL_DATABASE_URL: "postgres://postgres:postgrespassword@editframe-postgres:5432/${WORKTREE_DATABASE:-telecine-main}"
      HASURA_GRAPHQL_METADATA_DATABASE_URL: "postgres://postgres:postgrespassword@editframe-postgres:5432/${WORKTREE_DATABASE:-telecine-main}"
      # Use Docker service name for webhooks - web service is accessible directly via Docker DNS
      # This avoids Traefik routing issues when Hasura calls webhooks
      HASURA_ACTION_ORIGIN: "http://web:3000"
    depends_on:
      data-connector-agent:
        condition: service_healthy
    networks:
      - default
      - traefik-shared
    labels:
      traefik.enable: true
      traefik.http.routers.graphql-engine-${WORKTREE_ID:-main}.rule: "(Host(`${WORKTREE_DOMAIN:-localhost}`) || Host(`host.docker.internal`)) && PathPrefix(`/v1/graphql`)"
      traefik.http.routers.graphql-engine-${WORKTREE_ID:-main}.entrypoints: web
      traefik.http.routers.graphql-engine-${WORKTREE_ID:-main}.service: graphql-engine-${WORKTREE_ID:-main}
      traefik.http.routers.graphql-engine-${WORKTREE_ID:-main}.priority: 1000
      traefik.http.services.graphql-engine-${WORKTREE_ID:-main}.loadbalancer.server.port: 8080
  # test-graphql-engine:
  #   image: hasura/graphql-engine:v2.36.0.cli-migrations-v3
  #   volumes:
  #     - ${PWD}/services/graphql-engine/metadata:/hasura-metadata
  #     - ${PWD}/services/graphql-engine/migrations:/hasura-migrations
  #   ports:
  #     - "9090:8080"
  #   env_file:
  #     - ${PWD}/.test-env
  #   depends_on:
  #     data-connector-agent:
  #       condition: service_healthy
  data-connector-agent:
    image: hasura/graphql-data-connector:v2.36.0
    # ports:
      # - 8081:8081
    environment:
      QUARKUS_LOG_LEVEL: ERROR # FATAL, ERROR, WARN, INFO, DEBUG, TRACE
      ## https://quarkus.io/guides/opentelemetry#configuration-reference
      QUARKUS_OPENTELEMETRY_ENABLED: "false"
      ## QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENDPOINT: http://tracing:4317
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/athena/health"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s

networks:
  traefik-shared:
    name: editframe-shared
    external: true
