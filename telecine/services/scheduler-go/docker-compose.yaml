services:
  scheduler-go:
    profiles: ["render"]
    image: scheduler-go
    pull_policy: never
    restart: unless-stopped
    environment:
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - PORT=3000
      # Worker URLs — in local dev, workers are on the same Docker network.
      # The scheduler dials these over WebSocket to control scaling.
      - WORKER_URL_PROCESS_HTML_INITIALIZER=http://worker-process-html-initializer:3000
      - WORKER_URL_PROCESS_HTML_FINALIZER=http://worker-process-html-finalizer:3000
      - WORKER_URL_RENDER_INITIALIZER=http://worker-render-initializer:3000
      - WORKER_URL_RENDER_FRAGMENT=http://worker-render-fragment:3000
      - WORKER_URL_RENDER_FINALIZER=http://worker-render-finalizer:3000
      - WORKER_URL_PROCESS_ISOBMFF=http://worker-process-isobmff:3000
      - WORKER_URL_INGEST_IMAGE=http://worker-ingest-image:3000
      # Queue limits (same as Pulumi configs)
      - PROCESS_HTML_INITIALIZER_MAX_WORKER_COUNT=20
      - PROCESS_HTML_INITIALIZER_WORKER_CONCURRENCY=5
      - PROCESS_HTML_INITIALIZER_MIN_WORKER_COUNT=1
      - PROCESS_HTML_FINALIZER_MAX_WORKER_COUNT=10
      - PROCESS_HTML_FINALIZER_WORKER_CONCURRENCY=20
      - RENDER_INITIALIZER_MAX_WORKER_COUNT=10
      - RENDER_INITIALIZER_WORKER_CONCURRENCY=2
      - RENDER_INITIALIZER_MIN_WORKER_COUNT=1
      - RENDER_FRAGMENT_MAX_WORKER_COUNT=200
      - RENDER_FRAGMENT_WORKER_CONCURRENCY=1
      - RENDER_FINALIZER_MAX_WORKER_COUNT=10
      - RENDER_FINALIZER_WORKER_CONCURRENCY=20
      - PROCESS_ISOBMFF_MAX_WORKER_COUNT=20
      - PROCESS_ISOBMFF_WORKER_CONCURRENCY=5
      - INGEST_IMAGE_MAX_WORKER_COUNT=10
      - INGEST_IMAGE_WORKER_CONCURRENCY=20
    networks:
      - default
      - traefik-shared
    deploy:
      resources:
        limits:
          cpus: ${SCHEDULER_GO_CPUS:-0.5}
          memory: ${SCHEDULER_GO_MEMORY:-128M}

networks:
  default:
    name: ${WORKTREE_DOCKER_NETWORK_NAME:-telecine_default}
  traefik-shared:
    name: editframe-shared
    external: true
