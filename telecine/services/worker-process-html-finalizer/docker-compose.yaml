services:
  worker-process-html-finalizer:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-process-html-finalizer
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command:
      [
        "tsx",
        "--watch",
        "/app/services/worker-process-html-finalizer/server.ts",
      ]
    networks:
      - default
      - editframe-shared
    deploy:
      resources:
        limits:
          cpus: ${WORKER_HTML_FINALIZER_CPUS:-1}
          memory: ${WORKER_HTML_FINALIZER_MEMORY:-1G}

networks:
  editframe-shared:
    name: editframe-shared
    external: true
