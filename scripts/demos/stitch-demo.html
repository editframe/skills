<!DOCTYPE html>
<!-- Stitch: terminal clip → 0.4s flash → output video.
     VIDEO_CLIP_1, VIDEO_CLIP_2 and durations replaced by make-demo. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LLM Demo Stitch</title>
    <script type="module" src="./src/index.js"></script>
    <style>
      body { margin: 0; padding: 0; background: #000; }
      @keyframes flash-in  { from { opacity: 0; } to { opacity: 1; } }
      @keyframes flash-out { from { opacity: 1; } to { opacity: 0; } }
    </style>
  </head>
  <body>
    <ef-timegroup
      workbench
      mode="sequence"
      class="w-[1920px] h-[1080px] bg-black relative overflow-hidden"
    >

      <!-- Clip 1: LLM terminal (prompt → claude writing → render) -->
      <ef-timegroup mode="fixed" duration="CLIP_1_DURs" class="absolute w-full h-full bg-black">
        <ef-video
          src="VIDEO_CLIP_1"
          class="absolute w-full h-full object-cover"
        ></ef-video>
      </ef-timegroup>

      <!-- 0.4s red flash cut — the "render button pressed" moment -->
      <ef-timegroup mode="fixed" duration="0.4s" class="absolute w-full h-full bg-[#e53935]">
      </ef-timegroup>

      <!-- Clip 2: the rendered weather video, full bleed -->
      <ef-timegroup mode="fixed" duration="CLIP_2_DURs" class="absolute w-full h-full bg-black">
        <ef-video
          src="VIDEO_CLIP_2"
          class="absolute w-full h-full object-cover"
        ></ef-video>
      </ef-timegroup>

    </ef-timegroup>
  </body>
</html>
