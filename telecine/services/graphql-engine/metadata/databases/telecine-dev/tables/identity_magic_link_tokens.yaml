table:
  name: magic_link_tokens
  schema: identity
event_triggers:
  - name: magic_link_tokens_email
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/deliver_magic_link_email'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
