table:
  name: password_resets
  schema: identity
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: password_resets
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
event_triggers:
  - name: password_resets_email
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 1
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/deliver_reset_password_email'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
