table:
  name: email_passwords
  schema: identity
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: email_passwords
  custom_root_fields: {}
object_relationships:
  - name: confirmation
    using:
      manual_configuration:
        column_mapping:
          id: email_password_id
        insertion_order: null
        remote_table:
          name: email_confirmations
          schema: identity
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: ef-admin
    permission:
      columns:
        - hash
        - salt
        - email_address
        - created_at
        - updated_at
        - id
        - user_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: org-admin
    permission:
      columns:
        - email_address
      filter: {}
    comment: ""
  - role: org-reader
    permission:
      columns:
        - email_address
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - email_address
        - id
        - user_id
      filter: {}
    comment: ""
update_permissions:
  - role: user
    permission:
      columns: []
      filter: {}
      check: null
      set:
        user_id: x-hasura-user-id
    comment: ""
event_triggers:
  - name: email_passwords_changed _password_email
    definition:
      enable_manual: true
      update:
        columns:
          - salt
          - hash
    retry_conf:
      interval_sec: 30
      num_retries: 0
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/deliver_update_password_email'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
