services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.53.0-jammy
    command: [ "npx", "-y", "playwright@1.53.0", "test", "--project=chromium", "--ui-port=4444", "--ui-host=0.0.0.0" ]
    working_dir: /app
    env_file:
      - ${PWD}/.env
    volumes:
      - ${TELECINE_ROOT_HOST:-${PWD}}:/app
      - node_modules:/app/node_modules
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ${ELEMENTS_PATH:-../elements}:/app/lib/packages
    # Playwright UI accessible via Traefik HTTP routing (same port for all worktrees!)
    expose:
      - "4444"
    networks:
      - default
      - traefik-shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.playwright.rule=Host(`playwright.${WORKTREE_DOMAIN:-localhost}`)
      - traefik.http.routers.playwright.entrypoints=web
      - traefik.http.services.playwright.loadbalancer.server.port=4444