services:
  worker-process-isobmff:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-process-isobmff
      - WORKER_MODE=websocket
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command:
      ["tsx", "--watch", "/app/services/worker-process-isobmff/server.ts"]
    networks:
      - default
      - editframe-shared
    deploy:
      resources:
        limits:
          cpus: ${WORKER_PROCESS_ISOBMFF_CPUS:-2}
          memory: ${WORKER_PROCESS_ISOBMFF_MEMORY:-4G}

networks:
  editframe-shared:
    name: editframe-shared
    external: true
