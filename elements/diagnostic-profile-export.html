<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Foreign Object Export Profile</title>
  <script type="module">
    import { defineCustomElements } from './packages/elements/dist/index.js';
    
    // Patch performance timing into syncNodeStyles to measure cache overhead
    let syncStylesTime = 0;
    let cacheGetTime = 0;
    let cacheSetTime = 0;
    let getComputedStyleTime = 0;
    let styleAssignmentTime = 0;
    let syncStylesCalls = 0;
    
    defineCustomElements();
    
    async function runProfile() {
      const tg = document.createElement('ef-timegroup');
      tg.width = 1920;
      tg.height = 1080;
      tg.fps = 30;
      document.body.appendChild(tg);
      
      // Create a simple composition with video
      const video = document.createElement('ef-video');
      video.src = '/test-assets/test/video-frame-foreign.mp4';
      video.width = 1920;
      video.height = 1080;
      tg.appendChild(video);
      
      await new Promise(r => setTimeout(r, 1000));
      
      // Monkey patch Map.get and Map.set to measure cache overhead
      const originalGet = Map.prototype.get;
      const originalSet = Map.prototype.set;
      
      Map.prototype.get = function(...args) {
        const start = performance.now();
        const result = originalGet.apply(this, args);
        cacheGetTime += performance.now() - start;
        return result;
      };
      
      Map.prototype.set = function(...args) {
        const start = performance.now();
        const result = originalSet.apply(this, args);
        cacheSetTime += performance.now() - start;
        return result;
      };
      
      // Monkey patch getComputedStyle
      const originalGetComputedStyle = window.getComputedStyle;
      window.getComputedStyle = function(...args) {
        const start = performance.now();
        const result = originalGetComputedStyle.apply(this, args);
        getComputedStyleTime += performance.now() - start;
        return result;
      };
      
      console.log('Starting export profile (5 seconds @ 30fps = 150 frames)...');
      const exportStart = performance.now();
      
      try {
        await tg.renderToVideo({
          fps: 30,
          toMs: 5000,
          returnBuffer: true,
          codec: 'avc',
          bitrate: 2_000_000,
        });
      } catch (e) {
        console.error('Export failed:', e);
      }
      
      const exportTime = performance.now() - exportStart;
      
      // Restore original functions
      Map.prototype.get = originalGet;
      Map.prototype.set = originalSet;
      window.getComputedStyle = originalGetComputedStyle;
      
      console.log('\n=== TIMING BREAKDOWN ===');
      console.log(`Total export time: ${exportTime.toFixed(0)}ms`);
      console.log(`Frames: 150`);
      console.log(`Time per frame: ${(exportTime / 150).toFixed(1)}ms`);
      console.log(`Realtime speed: ${(5000 / exportTime).toFixed(2)}x`);
      console.log(`\n--- CSS Cache Overhead ---`);
      console.log(`Map.get() time: ${cacheGetTime.toFixed(0)}ms (${(cacheGetTime/exportTime*100).toFixed(1)}%)`);
      console.log(`Map.set() time: ${cacheSetTime.toFixed(0)}ms (${(cacheSetTime/exportTime*100).toFixed(1)}%)`);
      console.log(`Total cache time: ${(cacheGetTime + cacheSetTime).toFixed(0)}ms (${((cacheGetTime + cacheSetTime)/exportTime*100).toFixed(1)}%)`);
      console.log(`\n--- Style Computation ---`);
      console.log(`getComputedStyle time: ${getComputedStyleTime.toFixed(0)}ms (${(getComputedStyleTime/exportTime*100).toFixed(1)}%)`);
      
      // Get profiler data
      const profiler = await import('./packages/elements/dist/preview/RenderProfiler.js');
      const stats = profiler.defaultProfiler.getStats();
      
      console.log(`\n--- Render Phases ---`);
      for (const [phase, data] of Object.entries(stats)) {
        if (data.total > 0) {
          console.log(`${phase}: ${data.total.toFixed(0)}ms (${(data.total/exportTime*100).toFixed(1)}%) - ${data.count} calls - ${data.avg.toFixed(1)}ms avg`);
        }
      }
    }
    
    window.addEventListener('load', () => {
      setTimeout(runProfile, 500);
    });
  </script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: monospace;
      background: #1e1e1e;
      color: #d4d4d4;
    }
  </style>
</head>
<body>
  <h1>Export Profiling...</h1>
  <p>Check console for results</p>
</body>
</html>
