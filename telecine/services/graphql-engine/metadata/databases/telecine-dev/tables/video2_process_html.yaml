table:
  name: process_html
  schema: video2
object_relationships:
  - name: org
    using:
      foreign_key_constraint_on: org_id
array_relationships:
  - name: attempts
    using:
      foreign_key_constraint_on:
        column: process_html_id
        table:
          name: process_html_attempts
          schema: video2
select_permissions:
  - role: org-reader
    permission:
      columns:
        - attempt_count
        - completed_at
        - created_at
        - failed_at
        - html
        - id
        - org_id
        - render_id
        - started_at
      filter:
        org:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
      limit: 50
      allow_aggregations: true
    comment: ""
