processes:
  host-chrome:
    command: npx tsx scripts/start-host-chrome.ts
    ready_log_line: "Playwright wsEndpoint:"
  compose:
    command: scripts/docker-compose up runner dev-projects
    ready_log_line: "Attaching to"
    depends_on:
      host-chrome:
        condition: process_log_ready
        required: false
  dev-projects:
    command: scripts/start-dev-projects
    ready_log_line: "Listening on 4321"
    depends_on:
      compose:
        condition: process_log_ready
