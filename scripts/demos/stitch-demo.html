<!DOCTYPE html>
<!-- Stitch composition: sequences 2 clips with a title card between them.
     VIDEO_CLIP_1, VIDEO_CLIP_2 and durations are replaced by make-demo. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LLM Demo Stitch</title>
    <script type="module" src="./src/index.js"></script>
    <style>
      body { margin: 0; padding: 0; background: #000; }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slide-right {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
      }
    </style>
  </head>
  <body>
    <ef-timegroup
      workbench
      mode="sequence"
      class="w-[1920px] h-[1080px] bg-black relative overflow-hidden"
    >

      <!-- ── Title card: PROMPT ── 2.5s -->
      <ef-timegroup mode="fixed" duration="2.5s" class="absolute w-full h-full bg-[#0a0a0a] flex flex-col items-center justify-center gap-6">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 rounded-full bg-[#e53935]" style="animation: fade-in 0.3s ease-out both;"></div>
          <div class="w-3 h-3 rounded-full bg-[#ffb300]" style="animation: fade-in 0.3s ease-out 0.05s both;"></div>
          <div class="w-3 h-3 rounded-full bg-[#2e7d32]" style="animation: fade-in 0.3s ease-out 0.1s both;"></div>
        </div>
        <ef-text
          split="word"
          class="text-[88px] font-black tracking-tighter text-white leading-none"
          style="animation: fade-up 0.6s cubic-bezier(0.16,1,0.3,1) both; animation-delay: calc(0.2s + var(--ef-word-index) * 80ms);"
        >PROMPT</ef-text>
        <div class="w-32 h-[3px] bg-[#e53935] origin-left"
             style="animation: slide-right 0.5s cubic-bezier(0.16,1,0.3,1) 0.5s both;"></div>
        <ef-text class="text-[28px] text-white/40 tracking-[0.25em] font-light"
                 style="animation: fade-in 0.5s ease-out 0.7s both;">CLAUDE · EDITFRAME</ef-text>
      </ef-timegroup>

      <!-- ── Clip 1: LLM terminal (claude prompt + render) ── -->
      <ef-timegroup mode="fixed" duration="CLIP_1_DURs" class="absolute w-full h-full bg-black">
        <ef-video
          src="VIDEO_CLIP_1"
          class="absolute w-full h-full object-contain"
          style="animation: fade-in 0.4s ease-out both;"
        ></ef-video>
      </ef-timegroup>

      <!-- ── Title card: OUTPUT ── 2.5s -->
      <ef-timegroup mode="fixed" duration="2.5s" class="absolute w-full h-full bg-[#0a0a0a] flex flex-col items-center justify-center gap-6">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 rounded-full bg-[#e53935]" style="animation: fade-in 0.3s ease-out both;"></div>
          <div class="w-3 h-3 rounded-full bg-[#ffb300]" style="animation: fade-in 0.3s ease-out 0.05s both;"></div>
          <div class="w-3 h-3 rounded-full bg-[#2e7d32]" style="animation: fade-in 0.3s ease-out 0.1s both;"></div>
        </div>
        <ef-text
          split="word"
          class="text-[88px] font-black tracking-tighter text-white leading-none"
          style="animation: fade-up 0.6s cubic-bezier(0.16,1,0.3,1) both; animation-delay: calc(0.2s + var(--ef-word-index) * 80ms);"
        >OUTPUT</ef-text>
        <div class="w-32 h-[3px] bg-[#e53935] origin-left"
             style="animation: slide-right 0.5s cubic-bezier(0.16,1,0.3,1) 0.5s both;"></div>
        <ef-text class="text-[28px] text-white/40 tracking-[0.25em] font-light"
                 style="animation: fade-in 0.5s ease-out 0.7s both;">RENDERED VIDEO</ef-text>
      </ef-timegroup>

      <!-- ── Clip 2: the rendered weather video ── -->
      <ef-timegroup mode="fixed" duration="CLIP_2_DURs" class="absolute w-full h-full bg-black">
        <ef-video
          src="VIDEO_CLIP_2"
          class="absolute w-full h-full object-cover"
          style="animation: fade-in 0.4s ease-out both;"
        ></ef-video>
      </ef-timegroup>

    </ef-timegroup>
  </body>
</html>
