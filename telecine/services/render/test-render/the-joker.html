<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Cool Video</title>
    <script type="module" src="./src/the-joker.ts"></script>
    <link rel="stylesheet" href="./src/the-joker.css" />
  </head>
  <body>
    <ef-timegroup
      mode="sequence"
      class="h-full w-full overflow-scroll bg-gray-400"
    >
      <ef-timegroup
        mode="fixed"
        duration="5s"
        class="absolute"
        style="
          animation:
            fadein 250ms backwards,
            fadeout 10ms calc(var(--ef-duration) - 10ms) forwards;
        "
      >
        <!-- <ef-audio
          id="joker-poem"
          src="./assets/cards/card-joker.mp3"
        ></ef-audio> -->
        <div
          class="absolute z-10 flex h-full flex-col items-center justify-center"
        >
          <h1
            class="font-serif mb-3 inline-block text-4xl font-extralight text-pink-400 underline"
          >
            The Joker
          </h1>
          <ef-image
            class="w-1/2"
            src="./assets/cards/card-joker.png"
            x-style="animation: 4s spin"
          ></ef-image>
          <!-- <ef-waveform
            class="h-4 w-1/2 self-center"
            target="#joker-poem"
          ></ef-waveform> -->
        </div>
        <ef-image
          class="absolute z-0 h-full opacity-20 blur-md"
          src="./assets/cards/card-joker.png"
        ></ef-image>
      </ef-timegroup>
      <ef-timegroup
        mode="fixed"
        duration="5s"
        class="absolute"
        style="
          animation:
            fadein 10ms backwards,
            fadeout 1250ms calc(var(--ef-duration) - 1250ms) forwards;
        "
      >
        <!-- <ef-audio
          id="king-clubs-poem"
          src="./assets/cards/card-king-clubs.mp3"
        ></ef-audio> -->
        <div
          class="absolute z-10 flex h-full flex-col items-center justify-center"
        >
          <h1
            class="font-serif mb-3 inline-block text-4xl font-extralight underline"
            \
          >
            King of Clubs
          </h1>
          <ef-image
            class="w-1/2"
            src="./assets/cards/card-king-clubs.png"
          ></ef-image>
          <!-- <ef-waveform
            class="h-4 w-1/2 self-center"
            target="#king-clubs-poem"
          ></ef-waveform> -->
        </div>
        <ef-image
          class="absolute z-0 h-full opacity-20 blur-md"
          src="./assets/cards/card-king-clubs.png"
        ></ef-image>
      </ef-timegroup>
    </ef-timegroup>
  </body>
</html>
