name: Deploy
run-name: ${{ github.actor }} is deploying ${{ github.event.head_commit.message }}
on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

env:
  RUNNER_IMAGE: us-central1-docker.pkg.dev/editframe/telecine-artifacts/runner-image
  LOCAL_TAG: telecine-runner:latest

jobs:
  build-runner:
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    outputs:
      runner-image-tag: ${{ steps.set-cache-key.outputs.cache-key }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/gcloud-auth
      - name: Set cache key
        id: set-cache-key
        run: echo "cache-key=${{ runner.os }}-runner-image-${{ hashFiles('Dockerfile.runner', '.github/workflows/integration.yaml') }}" >> $GITHUB_OUTPUT
      - name: Check if image exists
        id: check-image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          if docker manifest inspect ${{ env.RUNNER_IMAGE }}:${{ steps.set-cache-key.outputs.cache-key }} > /dev/null 2>&1; then
            echo "image-exists=true" >> $GITHUB_OUTPUT
          else
            echo "image-exists=false" >> $GITHUB_OUTPUT
          fi
      - run: scripts/download-electron-build
        if: steps.check-image.outputs.image-exists != 'true'
      - name: Configure Docker for GCR
        if: steps.check-image.outputs.image-exists != 'true'
        run: |
          echo '{"experimental":true}' | sudo tee /etc/docker/daemon.json
          sudo service docker restart
      - name: Build and push runner image
        if: steps.check-image.outputs.image-exists != 'true'
        run: |
          TAG="${{ steps.set-cache-key.outputs.cache-key }}"

          docker pull ${{ env.RUNNER_IMAGE }}:latest || true
          docker build \
            --cache-from ${{ env.RUNNER_IMAGE }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --tag ${{ env.RUNNER_IMAGE }}:$TAG \
            --tag ${{ env.RUNNER_IMAGE }}:latest \
            --tag ${{ env.LOCAL_TAG }} \
            --file Dockerfile.runner \
            .

          docker push ${{ env.RUNNER_IMAGE }}:$TAG || echo "Failed to push ${{ env.RUNNER_IMAGE }}:$TAG"
          docker push ${{ env.RUNNER_IMAGE }}:latest || echo "Failed to push ${{ env.RUNNER_IMAGE }}:latest"

  integration:
    permissions:
      contents: "read"
      id-token: "write"
      actions: "write"
    needs: build-runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/gcloud-auth
      - uses: ./.github/actions/pull-and-retag
        with:
          cache-key: ${{ needs.build-runner.outputs.runner-image-tag }}
          image-name: ${{ env.RUNNER_IMAGE }}
          local-tag: ${{ env.LOCAL_TAG }}
      - uses: ./.github/actions/general-integration
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel -X POST || true

  playwright:
    permissions:
      contents: "read"
      id-token: "write"
      actions: "write"
    needs: build-runner
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: ["1/1"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/gcloud-auth
      - uses: ./.github/actions/pull-and-retag
        with:
          cache-key: ${{ needs.build-runner.outputs.runner-image-tag }}
          image-name: ${{ env.RUNNER_IMAGE }}
          local-tag: ${{ env.LOCAL_TAG }}
      - uses: ./.github/actions/playwright-integration
        with:
          shard: ${{ matrix.shard }}
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel -X POST || true

  typecheck:
    permissions:
      contents: "read"
      id-token: "write"
      actions: "write"
    needs: build-runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/gcloud-auth
      - uses: ./.github/actions/pull-and-retag
        with:
          cache-key: ${{ needs.build-runner.outputs.runner-image-tag }}
          image-name: ${{ env.RUNNER_IMAGE }}
          local-tag: ${{ env.LOCAL_TAG }}
      - uses: ./.github/actions/typecheck
      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel -X POST || true

  docker:
    strategy:
      fail-fast: true
      matrix:
        image: [
            web,
            worker-ingest-image,
            worker-process-html-initializer,
            worker-process-html-finalizer,
            worker-process-isobmff,
            worker-render-initializer,
            worker-render-fragment,
            worker-render-fragment-gpu,
            worker-render-finalizer,
            scheduler-go,
            maintenance,
            jit-transcoding,
            migration-job,
            # transcribe
          ]
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    env:
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      # The transcribe image is large, embedding a large whisper.cpp model
      # This needs to clear disk space to complete the build.
      # Other images do not need this, and it takes ~1 minute to execute.
      - name: Free disk space
        if: matrix.image == 'transcribe'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
      # The transcribe image needs the whisper builder cache, this pulls it
      # in advance of the build
      - name: Pull the cached whisper builder
        if: matrix.image == 'transcribe'
        run: |
          docker pull us-central1-docker.pkg.dev/editframe/telecine-artifacts/transcribe-whisper-builder:latest || true

      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/gcloud-auth
      # We appear to timeout the docker auth during the build, so we split into two steps
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - run: scripts/build-docker-prod ${{ matrix.image }}
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - run: scripts/push-docker-prod ${{ matrix.image }}

  deploy:
    permissions:
      contents: "read"
      id-token: "write"
    needs:
      - docker
      - integration
      - playwright
      - typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./deploy
    env:
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gcloud-auth

      - run: npm ci
      - run: pulumi login gs://deployment-state
      - run: pulumi stack select telecine-dot-dev
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - run: pulumi up -y --verbose=9
