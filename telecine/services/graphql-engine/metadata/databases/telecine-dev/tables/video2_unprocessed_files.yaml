table:
  name: unprocessed_files
  schema: video2
object_relationships:
  - name: api_key
    using:
      foreign_key_constraint_on: api_key_id
  - name: org
    using:
      foreign_key_constraint_on: org_id
  - name: process_isobmff
    using:
      manual_configuration:
        column_mapping:
          id: unprocessed_file_id
        insertion_order: null
        remote_table:
          name: process_isobmff
          schema: video2
  - name: user
    using:
      foreign_key_constraint_on: creator_id
insert_permissions:
  - role: org-editor
    permission:
      check:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
      set:
        api_key_id: x-hasura-api-key
        creator_id: x-hasura-User-Id
      columns:
        - byte_size
        - filename
        - id
        - org_id
    comment: ""
select_permissions:
  - role: org-admin
    permission:
      columns:
        - api_key_id
        - byte_size
        - complete
        - completed_at
        - creator_id
        - filename
        - id
        - md5
        - org_id
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
                    - reader
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-editor
    permission:
      columns:
        - byte_size
        - complete
        - completed_at
        - created_at
        - creator_id
        - filename
        - id
        - last_received_byte
        - md5
        - next_byte
        - org_id
        - remote_uri
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-reader
    permission:
      columns:
        - complete
        - byte_size
        - last_received_byte
        - next_byte
        - filename
        - remote_uri
        - completed_at
        - created_at
        - api_key_id
        - creator_id
        - id
        - md5
        - org_id
      filter:
        org:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: org-editor
    permission:
      columns: []
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
      check: null
    comment: ""
delete_permissions:
  - role: org-admin
    permission:
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-editor
    permission:
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
event_triggers:
  - name: unprocessed_files_cleanup
    definition:
      delete:
        columns: '*'
      enable_manual: false
    retry_conf:
      interval_sec: 120
      num_retries: 3
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/delete_unprocessed_files'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
  - name: unprocessed_files_webhook
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 30
      num_retries: 3
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/webhook_create_event'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
