services:
  otel-viewer:
    image: telecine-runner
    pull_policy: never
    working_dir: /app/services/otel-viewer
    volumes_from:
      - runner
    stdin_open: true
    tty: true
    command: ["sh", "-c", "cd /app/services/otel-viewer && /app/node_modules/.bin/vite --host"]
    ports:
      - "4320:4320"
    environment:
      - VITE_OTEL_RELAY_URL=http://localhost:4319
    labels:
      - traefik.enable=true
      - traefik.http.routers.otel-viewer.rule=Host(`otel-viewer.${WORKTREE_DOMAIN:-localhost}`)
      - traefik.http.routers.otel-viewer.entrypoints=web
      - traefik.http.services.otel-viewer.loadbalancer.server.port=4320
    depends_on:
      - runner
    networks:
      - default
      - traefik-shared
    stop_grace_period: 1s

networks:
  traefik-shared:
    name: telecine-traefik
    external: true
