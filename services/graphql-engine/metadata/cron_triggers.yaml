- name: Deliver API key about to expire email
  webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/deliver_api_key_expired_reminder'
  schedule: 0 0 * * *
  include_in_metadata: true
  payload: {}
  retry_conf:
    num_retries: 3
    retry_interval_seconds: 120
    timeout_seconds: 120
    tolerance_seconds: 21600
  headers:
    - name: X-ACTION-SECRET
      value_from_env: ACTION_SECRET
  comment: ""
