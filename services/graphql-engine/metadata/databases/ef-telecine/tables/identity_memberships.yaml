table:
  name: memberships
  schema: identity
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: memberships
  custom_root_fields: {}
object_relationships:
  - name: org
    using:
      foreign_key_constraint_on: org_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: ef-admin
    permission:
      columns:
        - role
        - created_at
        - updated_at
        - id
        - org_id
        - user_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: org-admin
    permission:
      columns:
        - created_at
        - id
        - org_id
        - role
        - updated_at
        - user_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: org-reader
    permission:
      columns:
        - role
        - created_at
        - updated_at
        - id
        - org_id
        - user_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - id
        - org_id
        - role
        - updated_at
        - user_id
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: org-admin
    permission:
      columns:
        - role
      filter:
        org:
          _or:
            - primary_user_id:
                _eq: X-Hasura-user-id
            - memberships:
                _and:
                  - role:
                      _eq: org-admin
                  - user_id:
                      _eq: X-Hasura-user-id
      check: null
    comment: ""
delete_permissions:
  - role: org-admin
    permission:
      filter: {}
    comment: ""
