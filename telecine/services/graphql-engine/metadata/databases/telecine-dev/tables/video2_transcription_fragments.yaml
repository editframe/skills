table:
  name: transcription_fragments
  schema: video2
object_relationships:
  - name: transcription
    using:
      foreign_key_constraint_on: transcription_id
select_permissions:
  - role: org-reader
    permission:
      columns:
        - completed_at
        - failed_at
        - sequence_number
        - started_at
        - transcription_id
      filter:
        transcription:
          org:
            memberships:
              user_id:
                _eq: X-Hasura-User-Id
      limit: 50
      allow_aggregations: true
    comment: ""
