<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion - All-in-One Workspace</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@editframe/elements/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #000;
    }

    @keyframes slide-up {
      from {
        transform: translateY(24px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes scale-pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes block-reveal {
      from {
        transform: translateX(-20px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .notion-bg-1 {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
    }

    .notion-bg-2 {
      background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
    }

    .notion-bg-3 {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
    }

    .block-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px;
      height: 100%;
      align-content: center;
    }

    .block-item {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      min-height: 60px;
      font-size: 12px;
      font-weight: 500;
      color: #333;
      animation: block-reveal 0.5s ease-out forwards;
    }

    .block-item:nth-child(1) { animation-delay: 0.1s; }
    .block-item:nth-child(2) { animation-delay: 0.2s; }
    .block-item:nth-child(3) { animation-delay: 0.3s; }
    .block-item:nth-child(4) { animation-delay: 0.4s; }

    .text-center {
      text-align: center;
    }

    .text-white { color: white; }
    .text-black { color: #1a1a1a; }

    .absolute { position: absolute; }
    .inset-0 { inset: 0; }
    .w-full { width: 100%; }
    .h-full { height: 100%; }
    .size-full { width: 100%; height: 100%; }

    .flex {
      display: flex;
    }

    .items-center {
      align-items: center;
    }

    .justify-center {
      justify-content: center;
    }

    .flex-col {
      flex-direction: column;
    }

    .gap-4 { gap: 16px; }
    .gap-8 { gap: 32px; }

    .px-4 { padding-left: 16px; padding-right: 16px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .px-6 { padding-left: 24px; padding-right: 24px; }
    .py-3 { padding-top: 12px; padding-bottom: 12px; }

    .rounded { border-radius: 8px; }

    .bg-black { background: #000; }
    .bg-white { background: #fff; }

    ef-text {
      display: block;
    }
  </style>
</head>
<body>
  <ef-configuration media-engine="local">
    <ef-timegroup mode="sequence" overlap="0.5s" class="w-[1080px] h-[1920px]">
      
      <!-- Scene 1: The Problem - Everything Scattered (0s-3s) -->
      <ef-timegroup mode="contain" class="absolute w-full h-full bg-black flex items-center justify-center" style="animation: 0.5s fade-out var(--ef-transition-out-start) both">
        <canvas id="scattered-blocks" class="absolute inset-0 size-full"></canvas>
        <ef-text class="absolute bottom-32 left-0 right-0 text-white text-5xl font-bold text-center px-4"
          style="animation: 0.6s slide-up 0.8s both">
          Everything
          <br>scattered
        </ef-text>
        <script>
          const canvas1 = document.getElementById('scattered-blocks');
          const ctx1 = canvas1.getContext('2d');
          const scene1 = canvas1.closest('ef-timegroup');
          
          scene1.initializer = (instance) => {
            return instance.addFrameTask((info) => {
              canvas1.width = canvas1.offsetWidth;
              canvas1.height = canvas1.offsetHeight;
              const progress = info.percentComplete;
              
              ctx1.clearRect(0, 0, canvas1.width, canvas1.height);
              
              // Draw scattered blocks that accumulate chaos
              const blockCount = Math.floor(progress * 40);
              for (let i = 0; i < blockCount; i++) {
                const seed = i * 43.1 + progress * 1000;
                const x = (Math.sin(seed) * 0.4 + 0.5) * canvas1.width;
                const y = (Math.cos(seed * 0.7) * 0.4 + 0.5) * canvas1.height;
                const size = 60 + Math.sin(seed * 0.3) * 20;
                const rotation = seed * 0.5;
                
                ctx1.save();
                ctx1.translate(x, y);
                ctx1.rotate(rotation);
                ctx1.strokeStyle = `rgba(255, 255, 255, ${0.2 + progress * 0.3})`;
                ctx1.lineWidth = 2;
                ctx1.strokeRect(-size/2, -size/2, size, size);
                ctx1.restore();
              }
            });
          };
        </script>
      </ef-timegroup>

      <!-- Scene 2: The Unified Space - Everything In One (3s-7s) -->
      <ef-timegroup mode="contain" class="absolute w-full h-full notion-bg-1 flex flex-col items-center justify-center" style="animation: 0.5s fade-in both, 0.5s fade-out var(--ef-transition-out-start) both">
        <ef-text class="absolute top-20 left-0 right-0 text-black text-5xl font-bold text-center px-4"
          style="animation: 0.6s slide-up both">
          One space
          <br>for everything
        </ef-text>
        
        <div class="block-grid absolute inset-0 w-full h-full">
          <div class="block-item" style="animation-delay: 1.0s">📝 Write</div>
          <div class="block-item" style="animation-delay: 1.1s">📋 Organize</div>
          <div class="block-item" style="animation-delay: 1.2s">🎯 Plan</div>
          <div class="block-item" style="animation-delay: 1.3s">⚙️ Connect</div>
        </div>
      </ef-timegroup>

      <!-- Scene 3: The Database Power - Everything Connected (7s-10s) -->
      <ef-timegroup mode="contain" class="absolute w-full h-full notion-bg-2 flex items-center justify-center" style="animation: 0.5s fade-in both, 0.5s fade-out var(--ef-transition-out-start) both">
        <canvas id="connected-nodes" class="absolute inset-0 size-full"></canvas>
        
        <ef-text class="absolute bottom-32 left-0 right-0 text-black text-4xl font-bold text-center px-4"
          style="animation: 0.6s slide-up 1s both">
          Your data,
          <br>beautifully organized
        </ef-text>

        <script>
          const canvas2 = document.getElementById('connected-nodes');
          const ctx2 = canvas2.getContext('2d');
          const scene2 = canvas2.closest('ef-timegroup');
          
          scene2.initializer = (instance) => {
            return instance.addFrameTask((info) => {
              canvas2.width = canvas2.offsetWidth;
              canvas2.height = canvas2.offsetHeight;
              const progress = info.percentComplete;
              
              ctx2.clearRect(0, 0, canvas2.width, canvas2.height);
              
              // Draw nodes that connect cleanly (opposite of scattered chaos)
              const nodeCount = 8;
              const nodes = [];
              
              for (let i = 0; i < nodeCount; i++) {
                const angle = (i / nodeCount) * Math.PI * 2;
                const radius = 200 + Math.sin(progress * Math.PI) * 50;
                const x = canvas2.width / 2 + Math.cos(angle) * radius;
                const y = canvas2.height / 2 + Math.sin(angle) * radius;
                nodes.push({ x, y });
              }
              
              // Draw connections
              ctx2.strokeStyle = `rgba(0, 0, 0, ${0.1 + progress * 0.2})`;
              ctx2.lineWidth = 1;
              for (let i = 0; i < nodes.length; i++) {
                const next = (i + 1) % nodes.length;
                ctx2.beginPath();
                ctx2.moveTo(nodes[i].x, nodes[i].y);
                ctx2.lineTo(nodes[next].x, nodes[next].y);
                ctx2.stroke();
              }
              
              // Draw nodes
              for (const node of nodes) {
                ctx2.beginPath();
                ctx2.arc(node.x, node.y, 8 + progress * 4, 0, Math.PI * 2);
                ctx2.fillStyle = `rgba(0, 0, 0, ${0.3 + progress * 0.5})`;
                ctx2.fill();
              }
            });
          };
        </script>
      </ef-timegroup>

      <!-- Scene 4: The Flexibility - Build It Your Way (10s-13s) -->
      <ef-timegroup mode="contain" class="absolute w-full h-full notion-bg-3 flex flex-col items-center justify-center gap-8" style="animation: 0.5s fade-in both, 0.5s fade-out var(--ef-transition-out-start) both">
        <ef-text class="absolute top-24 left-0 right-0 text-black text-5xl font-bold text-center px-4"
          style="animation: 0.6s slide-up both">
          Build your way
        </ef-text>

        <div class="absolute inset-0 flex items-center justify-center px-6">
          <div class="flex flex-col gap-4 w-full" style="max-width: 300px;">
            <div class="flex items-center gap-3 p-4 bg-black/5 rounded" style="animation: 0.5s slide-up 0.9s both; transform-origin: left;">
              <span style="font-size: 24px;">📄</span>
              <span class="text-black font-semibold">Pages</span>
            </div>
            <div class="flex items-center gap-3 p-4 bg-black/5 rounded" style="animation: 0.5s slide-up 1.1s both; transform-origin: left;">
              <span style="font-size: 24px;">📊</span>
              <span class="text-black font-semibold">Databases</span>
            </div>
            <div class="flex items-center gap-3 p-4 bg-black/5 rounded" style="animation: 0.5s slide-up 1.3s both; transform-origin: left;">
              <span style="font-size: 24px;">🔗</span>
              <span class="text-black font-semibold">Relations</span>
            </div>
          </div>
        </div>
      </ef-timegroup>

      <!-- Scene 5: The CTA - Start Building (13s-15s) -->
      <ef-timegroup mode="contain" class="absolute w-full h-full bg-black flex flex-col items-center justify-center gap-6" style="animation: 0.5s fade-in both">
        <ef-text class="text-white text-5xl font-bold text-center px-4"
          style="animation: 0.6s slide-up both">
          Start Building
        </ef-text>
        
        <ef-text class="text-white/70 text-xl text-center px-4"
          style="animation: 0.5s slide-up 0.3s both">
          Free forever. No credit card.
        </ef-text>

        <div class="mt-4 px-6 py-3 rounded bg-white text-black font-semibold text-lg"
          style="animation: 0.6s scale-pop 0.6s both; transform-origin: center;">
          Get Started
        </div>
      </ef-timegroup>

    </ef-timegroup>
  </ef-configuration>
</body>
</html>
