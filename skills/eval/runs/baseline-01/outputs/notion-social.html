<ef-timegroup mode="sequence" overlap="0.8s" class="w-[1080px] h-[1920px] bg-black">
  <!-- Scene 1: The Problem - Scattered Tools (0s-3s) -->
  <ef-timegroup mode="contain" class="absolute w-full h-full" style="animation: 0.8s fade-out var(--ef-transition-out-start) both">
    <ef-video src="https://assets.editframe.com/bars-n-tone.mp4" sourcein="0s" sourceout="3s" class="absolute inset-0 size-full object-cover"></ef-video>
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
    
    <ef-text split="char" class="absolute top-1/3 left-8 right-8 text-white text-5xl font-bold"
      style="animation: 0.4s char-in-chaos both; animation-delay: calc(var(--ef-word-index) * 30ms)">
      Notes everywhere
    </ef-text>
    
    <ef-text class="absolute bottom-32 left-8 right-8 text-white/80 text-2xl"
      style="animation: 0.5s fade-in-up 1.2s both">
      Docs scattered across apps
    </ef-text>
  </ef-timegroup>

  <!-- Scene 2: The Solution - Everything in One Place (3s-7s) -->
  <ef-timegroup mode="contain" class="absolute w-full h-full" style="animation: 0.8s fade-in both">
    <div class="absolute inset-0 bg-gradient-to-br from-violet-900 via-purple-900 to-black"></div>
    
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-white/10 rounded-3xl backdrop-blur-sm"
      style="animation: 0.6s scale-in-center both 0.3s; border: 2px solid rgba(168, 85, 247, 0.3);">
      <div class="absolute inset-0 flex items-center justify-center">
        <ef-text class="text-white text-4xl font-bold text-center"
          style="animation: 0.5s fade-in-up 0.9s both">
          ONE WORKSPACE
        </ef-text>
      </div>
    </div>
    
    <!-- Floating elements around center -->
    <div class="absolute top-20 left-8 w-24 h-24 bg-blue-500/20 rounded-2xl flex items-center justify-center backdrop-blur"
      style="animation: 0.7s float-in both 0.4s">
      <ef-text class="text-white text-3xl font-bold">📝</ef-text>
    </div>
    
    <div class="absolute top-20 right-8 w-24 h-24 bg-green-500/20 rounded-2xl flex items-center justify-center backdrop-blur"
      style="animation: 0.7s float-in both 0.6s">
      <ef-text class="text-white text-3xl font-bold">✓</ef-text>
    </div>
    
    <div class="absolute bottom-40 left-8 w-24 h-24 bg-pink-500/20 rounded-2xl flex items-center justify-center backdrop-blur"
      style="animation: 0.7s float-in both 0.5s">
      <ef-text class="text-white text-3xl font-bold">📊</ef-text>
    </div>
    
    <div class="absolute bottom-40 right-8 w-24 h-24 bg-yellow-500/20 rounded-2xl flex items-center justify-center backdrop-blur"
      style="animation: 0.7s float-in both 0.7s">
      <ef-text class="text-white text-3xl font-bold">🎯</ef-text>
    </div>
  </ef-timegroup>

  <!-- Scene 3: Key Features (7s-10.5s) -->
  <ef-timegroup mode="contain" class="absolute w-full h-full" style="animation: 0.8s fade-out var(--ef-transition-out-start) both">
    <ef-video src="https://assets.editframe.com/bars-n-tone.mp4" sourcein="5s" sourceout="10s" class="absolute inset-0 size-full object-cover opacity-40"></ef-video>
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>
    
    <div class="absolute top-1/4 left-8 right-8 space-y-6">
      <div class="flex items-start gap-4" style="animation: 0.5s slide-in-left both 0.3s">
        <ef-text class="text-purple-400 text-4xl flex-shrink-0">📄</ef-text>
        <div>
          <ef-text class="text-white text-2xl font-bold">Write & Collaborate</ef-text>
          <ef-text class="text-white/60 text-sm">Docs, notes, wikis</ef-text>
        </div>
      </div>
      
      <div class="flex items-start gap-4" style="animation: 0.5s slide-in-left both 0.5s">
        <ef-text class="text-blue-400 text-4xl flex-shrink-0">📋</ef-text>
        <div>
          <ef-text class="text-white text-2xl font-bold">Plan & Organize</ef-text>
          <ef-text class="text-white/60 text-sm">Tasks, databases, views</ef-text>
        </div>
      </div>
      
      <div class="flex items-start gap-4" style="animation: 0.5s slide-in-left both 0.7s">
        <ef-text class="text-pink-400 text-4xl flex-shrink-0">🔗</ef-text>
        <div>
          <ef-text class="text-white text-2xl font-bold">Connect Everything</ef-text>
          <ef-text class="text-white/60 text-sm">Your whole workspace</ef-text>
        </div>
      </div>
    </div>
  </ef-timegroup>

  <!-- Scene 4: CTA - Join Millions (10.5s-15s) -->
  <ef-timegroup mode="contain" class="absolute w-full h-full" style="animation: 0.8s fade-in both">
    <div class="absolute inset-0 bg-gradient-to-br from-violet-600 via-purple-700 to-black"></div>
    
    <!-- Animated background circles -->
    <div class="absolute top-1/3 -left-20 w-64 h-64 bg-white/5 rounded-full blur-3xl"
      style="animation: 0.8s pulse-glow both 0.2s"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-violet-400/5 rounded-full blur-3xl"
      style="animation: 0.8s pulse-glow 0.5s both"></div>
    
    <div class="absolute inset-0 flex flex-col items-center justify-center gap-12 px-8">
      <ef-text split="word" class="text-white text-5xl font-black text-center"
        style="animation: 0.6s scale-in-fade both; animation-delay: calc(var(--ef-word-index) * 100ms)">
        Your all-in-one workspace
      </ef-text>
      
      <ef-text class="text-white/90 text-xl text-center max-w-md"
        style="animation: 0.5s fade-in-up 1.2s both">
        Used by millions of teams
      </ef-text>
      
      <div class="relative" style="animation: 0.6s scale-in-center both 1.5s">
        <div class="absolute inset-0 bg-white/20 blur-lg rounded-xl"></div>
        <ef-text class="relative bg-white text-violet-700 px-12 py-4 rounded-xl text-2xl font-bold text-center"
          style="animation: 0.4s pulse-scale both 1.5s">
          Start Free
        </ef-text>
      </div>
    </div>
  </ef-timegroup>
</ef-timegroup>

<style>
  @keyframes char-in-chaos {
    from { 
      opacity: 0; 
      transform: translateX(-8px) rotateZ(-2deg); 
    }
    to { 
      opacity: 1; 
      transform: translateX(0) rotateZ(0); 
    }
  }

  @keyframes fade-in-up {
    from { 
      opacity: 0; 
      transform: translateY(16px); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0); 
    }
  }

  @keyframes scale-in-center {
    from { 
      opacity: 0; 
      transform: scale(0.85); 
    }
    to { 
      opacity: 1; 
      transform: scale(1); 
    }
  }

  @keyframes float-in {
    from { 
      opacity: 0; 
      transform: translateY(20px) scale(0.8); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0) scale(1); 
    }
  }

  @keyframes slide-in-left {
    from { 
      opacity: 0; 
      transform: translateX(-24px); 
    }
    to { 
      opacity: 1; 
      transform: translateX(0); 
    }
  }

  @keyframes pulse-glow {
    0%, 100% { 
      opacity: 0.5; 
      transform: scale(1); 
    }
    50% { 
      opacity: 0.8; 
      transform: scale(1.1); 
    }
  }

  @keyframes scale-in-fade {
    from { 
      opacity: 0; 
      transform: scale(0.9) translateY(10px); 
    }
    to { 
      opacity: 1; 
      transform: scale(1) translateY(0); 
    }
  }

  @keyframes pulse-scale {
    0%, 100% { 
      transform: scale(1); 
    }
    50% { 
      transform: scale(1.05); 
    }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fade-out {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
