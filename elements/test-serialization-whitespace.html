<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Serialization Whitespace Test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .container {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    .section {
      flex: 1;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 4px;
    }
    .section h3 {
      margin-top: 0;
    }
    #live-text, #serialized-result {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      min-height: 100px;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .highlight {
      background: yellow;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      margin: 10px 5px;
    }
  </style>
</head>
<body>
  <h1>Text Serialization Whitespace Test</h1>
  
  <div>
    <label>
      Test Text: 
      <input type="text" id="test-text" value="Hello World Test" style="width: 300px;">
    </label>
    <label>
      Split Mode:
      <select id="split-mode">
        <option value="word">Word</option>
        <option value="char">Char</option>
        <option value="line">Line</option>
      </select>
    </label>
    <button onclick="runTest()">Run Test</button>
  </div>

  <div class="container">
    <div class="section">
      <h3>Live DOM (Source)</h3>
      <div id="live-text"></div>
    </div>
    <div class="section">
      <h3>Serialized & Re-rendered</h3>
      <div id="serialized-result"></div>
    </div>
  </div>

  <div class="section">
    <h3>Serialized XML Output</h3>
    <pre id="xml-output"></pre>
  </div>

  <div class="section">
    <h3>Analysis</h3>
    <pre id="analysis"></pre>
  </div>

  <script type="module">
    import { serializeTimelineToXHTML } from './packages/elements/dist/preview/rendering/serializeTimelineDirect.js';
    
    window.runTest = async function() {
      const textValue = document.getElementById('test-text').value;
      const splitMode = document.getElementById('split-mode').value;
      
      // Clear previous results
      document.getElementById('live-text').innerHTML = '';
      document.getElementById('serialized-result').innerHTML = '';
      document.getElementById('xml-output').textContent = '';
      document.getElementById('analysis').textContent = '';
      
      // Create ef-text element
      const text = document.createElement('ef-text');
      text.split = splitMode;
      text.textContent = textValue;
      text.style.fontSize = '24px';
      
      // Add to live DOM
      document.getElementById('live-text').appendChild(text);
      
      // Wait for segments to render
      await text.updateComplete;
      await text.whenSegmentsReady();
      
      console.log('Text element ready, segments:', text.segments);
      
      // Serialize
      const xhtml = await serializeTimelineToXHTML(text, 800, 600, {
        canvasScale: 1,
        timeMs: 0,
      });
      
      // Display XML
      document.getElementById('xml-output').textContent = xhtml;
      
      // Parse and render the serialized version
      const parser = new DOMParser();
      const doc = parser.parseFromString(xhtml, 'application/xhtml+xml');
      const parseError = doc.querySelector('parsererror');
      
      if (parseError) {
        document.getElementById('analysis').textContent = 'XML Parse Error:\n' + parseError.textContent;
        return;
      }
      
      // Extract the serialized content
      const serializedRoot = doc.documentElement;
      document.getElementById('serialized-result').appendChild(serializedRoot.cloneNode(true));
      
      // Analyze the output
      const analysis = [];
      
      // Count segments
      const spanElements = xhtml.match(/<span[^>]*>/g) || [];
      analysis.push(`Total <span> elements: ${spanElements.length}`);
      
      // Check for whitespace preservation
      const xmlSpaceCount = (xhtml.match(/xml:space="preserve"/g) || []).length;
      analysis.push(`Elements with xml:space="preserve": ${xmlSpaceCount}`);
      
      // Check for flex-shrink
      const flexShrinkCount = (xhtml.match(/flex-shrink:0/g) || []).length;
      analysis.push(`Elements with flex-shrink:0: ${flexShrinkCount}`);
      
      // Find whitespace segments
      const whitespaceSegments = [];
      const segmentRegex = /<span[^>]*>([^<]*)<\/span>/g;
      let match;
      while ((match = segmentRegex.exec(xhtml)) !== null) {
        const content = match[1];
        if (/^\s+$/.test(content)) {
          whitespaceSegments.push({
            full: match[0],
            content: content,
            length: content.length
          });
        }
      }
      
      analysis.push(`\nWhitespace segments found: ${whitespaceSegments.length}`);
      whitespaceSegments.forEach((seg, i) => {
        analysis.push(`  ${i + 1}. Length: ${seg.length}, Content: "${seg.content.replace(/ /g, '·')}"`);
      });
      
      // Check actual text content
      const originalText = textValue;
      const serializedText = serializedRoot.textContent || '';
      analysis.push(`\nOriginal text: "${originalText}"`);
      analysis.push(`Serialized text: "${serializedText}"`);
      analysis.push(`Texts match: ${originalText === serializedText}`);
      
      document.getElementById('analysis').textContent = analysis.join('\n');
    };
    
    // Auto-run on load
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => runTest(), 100);
    });
  </script>
</body>
</html>
