<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel Launch</title>
  <link rel="stylesheet" href="/@editframe/elements/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #000;
    }

    @keyframes git-push {
      from {
        transform: translateX(-8px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes materialize {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fade-out {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    @keyframes rise-in {
      from {
        transform: translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .bg-vercel-dark {
      background: #0a0a0a;
    }

    .text-white {
      color: #ffffff;
    }

    .text-gray-400 {
      color: #a0a0a0;
    }

    .font-mono {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .font-display {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .git-command {
      display: inline-block;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <ef-timegroup mode="sequence" class="w-[1200px] h-[675px] bg-vercel-dark" workbench>
    
    <!-- Scene 1: Git Push (0-5s) -->
    <ef-timegroup mode="fixed" duration="5s" class="absolute w-full h-full flex items-center justify-center">
      <div class="absolute inset-0 bg-gradient-to-br from-[#0a0a0a] via-[#1a1a1a] to-[#0a0a0a]"></div>
      
      <div class="relative">
        <ef-text
          class="text-white font-mono text-2xl mb-8"
          style="animation: git-push 0.6s ease-out both"
        >
          <span class="text-gray-400">$</span> git push origin main
        </ef-text>
        
        <ef-text
          class="text-gray-400 font-mono text-sm"
          style="animation: fade-in 0.4s ease-out both 0.8s"
        >
          → Building...
        </ef-text>
      </div>
    </ef-timegroup>

    <!-- Scene 2: Distributed Network Visualization (5-10s) -->
    <ef-timegroup mode="fixed" duration="5s" class="absolute w-full h-full flex items-center justify-center"
      style="animation: fade-in 0.4s ease-out both">
      <div class="absolute inset-0 bg-gradient-to-br from-[#0a0a0a] via-[#0d1117] to-[#0a0a0a]"></div>
      
      <canvas id="network-canvas" class="absolute inset-0 size-full"></canvas>
      
      <ef-text
        class="absolute bottom-12 text-white font-display text-xl"
        style="animation: rise-in 0.6s ease-out both 0.8s"
      >
        Deployed globally. No configuration.
      </ef-text>
    </ef-timegroup>

    <!-- Scene 3: Preview URL (10-15s) -->
    <ef-timegroup mode="fixed" duration="5s" class="absolute w-full h-full flex flex-col items-center justify-center"
      style="animation: fade-in 0.3s ease-out both">
      <div class="absolute inset-0 bg-gradient-to-b from-[#0a0a0a] to-[#000000]"></div>
      
      <div class="relative z-10 text-center">
        <ef-text
          class="text-white font-display text-3xl mb-6"
          style="animation: rise-in 0.5s ease-out both 0s"
        >
          Deploy instantly.
        </ef-text>
        
        <ef-text
          class="text-gray-400 font-mono text-sm mb-8"
          style="animation: rise-in 0.5s ease-out both 0.3s"
        >
          <span class="text-blue-400">vercel.app/pr-1234</span>
        </ef-text>
        
        <ef-text
          class="text-white font-display text-lg"
          style="animation: rise-in 0.5s ease-out both 0.6s"
        >
          Ship the web. Build faster.
        </ef-text>
      </div>

      <div class="absolute bottom-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"
        style="animation: fade-in 0.6s ease-out both 1s"></div>
    </ef-timegroup>

  </ef-timegroup>

  <script>
    const networkCanvas = document.getElementById('network-canvas');
    const scene2 = document.querySelector('ef-timegroup:nth-of-type(2)');

    if (scene2 && networkCanvas) {
      scene2.addFrameTask((ownCurrentTimeMs, durationMs) => {
        networkCanvas.width = networkCanvas.offsetWidth;
        networkCanvas.height = networkCanvas.offsetHeight;

        const ctx = networkCanvas.getContext('2d');
        const progress = ownCurrentTimeMs / durationMs;

        ctx.clearRect(0, 0, networkCanvas.width, networkCanvas.height);

        const centerX = networkCanvas.width / 2;
        const centerY = networkCanvas.height / 2;
        const maxRegions = Math.floor(progress * 12);

        // Draw central node
        ctx.beginPath();
        ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.9)';
        ctx.fill();

        // Draw distributed edge nodes as they materialize
        for (let i = 0; i < maxRegions; i++) {
          const angle = (i / 12) * Math.PI * 2;
          const distance = 140 + Math.sin(progress * Math.PI + i) * 20;
          const x = centerX + Math.cos(angle) * distance;
          const y = centerY + Math.sin(angle) * distance;

          // Draw node
          const nodeSize = 3 + Math.sin(progress * Math.PI + i * 0.5) * 2;
          ctx.beginPath();
          ctx.arc(x, y, nodeSize, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(59, 130, 246, ${0.5 + progress * 0.4})`;
          ctx.fill();

          // Draw connection line
          ctx.beginPath();
          ctx.moveTo(centerX, centerY);
          ctx.lineTo(x, y);
          ctx.strokeStyle = `rgba(59, 130, 246, ${0.2 + progress * 0.3})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        // Draw data flow along connections
        for (let i = 0; i < Math.floor(maxRegions * 0.7); i++) {
          const angle = (i / 12) * Math.PI * 2;
          const distance = 140 + Math.sin(progress * Math.PI + i) * 20;
          const flowProgress = (progress * 3 + i * 0.1) % 1;
          const flowX = centerX + Math.cos(angle) * distance * flowProgress;
          const flowY = centerY + Math.sin(angle) * distance * flowProgress;

          ctx.beginPath();
          ctx.arc(flowX, flowY, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(34, 197, 94, ${Math.max(0, 1 - flowProgress)})`;
          ctx.fill();
        }
      });
    }
  </script>
</body>
</html>
