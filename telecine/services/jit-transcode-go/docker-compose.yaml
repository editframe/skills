services:
  jit-transcode-go:
    build:
      context: .
      dockerfile: services/jit-transcode-go/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ${PWD}/.env
    environment:
      - OTEL_SERVICE_NAME=jit-transcode-go
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tracing:4318
      - PORT=3002
      - NODE_ENV=development
      - TEMP_DIR=/app/temp
    volumes:
      - ${TELECINE_ROOT_HOST:-${PWD}}/services/jit-transcode-go:/app/services/jit-transcode-go
      - ${TELECINE_ROOT_HOST:-${PWD}}/test-assets:/app/test-assets:ro
      - jit-transcode-go-cache:/app/temp
    networks:
      - default
      - traefik-shared
    labels:
      traefik.http.routers.jit-transcode-go-${WORKTREE_ID:-main}.rule: (Host(`${WORKTREE_DOMAIN:-localhost}`) || Host(`host.docker.internal`)) && PathPrefix(`/api/v1/transcode-go`)
      traefik.http.routers.jit-transcode-go-${WORKTREE_ID:-main}.entrypoints: web
      traefik.http.routers.jit-transcode-go-${WORKTREE_ID:-main}.priority: 999
      traefik.http.services.jit-transcode-go-${WORKTREE_ID:-main}.loadbalancer.server.port: 3002
    deploy:
      resources:
        limits:
          cpus: ${JIT_TRANSCODE_GO_CPUS:-1.0}
          memory: ${JIT_TRANSCODE_GO_MEMORY:-512M}

volumes:
  jit-transcode-go-cache:

networks:
  default:
    name: ${WORKTREE_DOCKER_NETWORK_NAME:-telecine_default}
  traefik-shared:
    name: telecine-traefik
    external: true
