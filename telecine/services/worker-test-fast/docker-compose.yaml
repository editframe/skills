services:
  worker-test-fast-initializer:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-test-fast-initializer
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command:
      ["tsx", "--watch", "/app/services/worker-test-fast/server-initializer.ts"]
    deploy:
      resources:
        limits:
          cpus: ${WORKER_TEST_FAST_INITIALIZER_CPUS:-0.5}
          memory: ${WORKER_TEST_FAST_INITIALIZER_MEMORY:-512M}

  worker-test-fast-main:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-test-fast-main
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command: ["tsx", "--watch", "/app/services/worker-test-fast/server-main.ts"]
    deploy:
      resources:
        limits:
          cpus: ${WORKER_TEST_FAST_MAIN_CPUS:-0.5}
          memory: ${WORKER_TEST_FAST_MAIN_MEMORY:-512M}

  worker-test-fast-finalizer:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-test-fast-finalizer
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command:
      ["tsx", "--watch", "/app/services/worker-test-fast/server-finalizer.ts"]
    deploy:
      resources:
        limits:
          cpus: ${WORKER_TEST_FAST_FINALIZER_CPUS:-0.5}
          memory: ${WORKER_TEST_FAST_FINALIZER_MEMORY:-512M}
