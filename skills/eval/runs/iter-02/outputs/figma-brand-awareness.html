<ef-timegroup mode="sequence" overlap="0.8s" class="w-[1080px] h-[1920px] bg-white">
    <!-- Scene 1: The Isolation Problem (0s-6s) -->
    <ef-timegroup mode="fixed" duration="6s" class="absolute w-full h-full bg-gradient-to-br from-slate-50 to-slate-100 flex flex-col items-center justify-center">
      <canvas id="isolation-canvas" class="absolute inset-0 size-full"></canvas>
      <div class="absolute inset-0 bg-gradient-to-t from-white/40 to-transparent"></div>
      
      <ef-text
        split="word"
        class="absolute top-1/3 left-6 right-6 text-slate-900 text-5xl font-bold text-center"
        style="animation: 0.6s word-in both; animation-delay: calc(var(--ef-word-index) * 100ms); z-index: 10"
      >Design alone is over</ef-text>

      <ef-text
        class="absolute bottom-32 left-6 right-6 text-slate-600 text-xl text-center"
        style="animation: 0.5s frame-enter 2s both; z-index: 10"
      >Files passed back and forth. Waiting. Rework. Friction.</ef-text>
    </ef-timegroup>

    <!-- Scene 2: The Shared Canvas (6s-12s) -->
    <ef-timegroup mode="fixed" duration="6s" class="absolute w-full h-full bg-white flex flex-col items-center justify-center"
      style="animation: 0.8s fade-in both, 0.8s fade-out var(--ef-transition-out-start) both">
      
      <canvas id="collaboration-canvas" class="absolute inset-0 size-full"></canvas>
      <div class="absolute inset-0 bg-gradient-to-t from-white to-transparent"></div>

      <ef-text
        split="word"
        class="absolute top-1/3 left-6 right-6 text-slate-900 text-5xl font-bold text-center"
        style="animation: 0.6s word-in 0.2s both; animation-delay: calc(0.2s + var(--ef-word-index) * 100ms); z-index: 10"
      >Everyone in one place</ef-text>

      <ef-text
        class="absolute bottom-32 left-6 right-6 text-slate-600 text-lg text-center max-w-sm"
        style="animation: 0.5s frame-enter 2.2s both; z-index: 10"
      >Design. Prototype. Build. All at once. All together.</ef-text>
    </ef-timegroup>

    <!-- Scene 3: Real-time Multiplayer (12s-18s) -->
    <ef-timegroup mode="fixed" duration="6s" class="absolute w-full h-full bg-slate-900 flex flex-col items-center justify-center"
      style="animation: 0.8s fade-in both, 0.8s fade-out var(--ef-transition-out-start) both">
      
      <canvas id="multiplayer-canvas" class="absolute inset-0 size-full"></canvas>

      <ef-text
        split="word"
        class="absolute top-1/3 left-6 right-6 text-white text-5xl font-bold text-center"
        style="animation: 0.6s word-in 0.2s both; animation-delay: calc(0.2s + var(--ef-word-index) * 100ms); z-index: 10"
      >Live. Real. In the browser.</ef-text>

      <ef-text
        class="absolute bottom-32 left-6 right-6 text-slate-300 text-lg text-center max-w-sm"
        style="animation: 0.5s frame-enter 2.2s both; z-index: 10"
      >No plugins. No file syncing. No waiting.</ef-text>
    </ef-timegroup>

    <!-- Scene 4: The Future (18s-24s) -->
    <ef-timegroup mode="fixed" duration="6s" class="absolute w-full h-full bg-gradient-to-br from-blue-600 to-purple-600 flex flex-col items-center justify-center"
      style="animation: 0.8s fade-in both, 0.8s fade-out var(--ef-transition-out-start) both">
      
      <canvas id="future-canvas" class="absolute inset-0 size-full opacity-30"></canvas>

      <ef-text
        split="word"
        class="absolute top-1/3 left-6 right-6 text-white text-5xl font-bold text-center"
        style="animation: 0.6s word-in 0.2s both; animation-delay: calc(0.2s + var(--ef-word-index) * 100ms); z-index: 10"
      >This is how teams design now</ef-text>
    </ef-timegroup>

    <!-- Scene 5: CTA (24s-30s) -->
    <ef-timegroup mode="fixed" duration="6s" class="absolute w-full h-full bg-white flex flex-col items-center justify-center"
      style="animation: 0.8s fade-in both">
      
      <canvas id="ending-canvas" class="absolute inset-0 size-full"></canvas>

      <div class="absolute inset-0 bg-gradient-to-b from-white via-transparent to-white/60"></div>

      <ef-text
        class="absolute top-1/4 left-6 right-6 text-slate-900 text-4xl font-bold text-center"
        style="animation: 0.6s scale-in 0.3s both; z-index: 10"
      >Figma</ef-text>

      <ef-text
        class="absolute top-2/5 left-6 right-6 text-slate-600 text-lg text-center"
        style="animation: 0.5s frame-enter 0.8s both; z-index: 10"
      >The collaborative design platform</ef-text>

      <ef-text
        class="absolute bottom-24 left-6 right-6 text-blue-600 text-xl font-semibold text-center"
        style="animation: 0.5s frame-enter 1.3s both; z-index: 10"
      >figma.com</ef-text>
    </ef-timegroup>
  </ef-timegroup>

  <script src="https://cdn.jsdelivr.net/npm/@editframe/elements"></script>

  <script>
    // Scene 1: Isolation - Individual circles separated, unable to connect
    const isolationCanvas = document.getElementById('isolation-canvas');
    const isolationTg = isolationCanvas.closest('ef-timegroup');
    
    isolationTg.initializer = (instance) => {
      return instance.addFrameTask((info) => {
        const ctx = isolationCanvas.getContext('2d');
        isolationCanvas.width = isolationCanvas.offsetWidth;
        isolationCanvas.height = isolationCanvas.offsetHeight;
        const progress = info.ownCurrentTimeMs / info.durationMs;

        ctx.clearRect(0, 0, isolationCanvas.width, isolationCanvas.height);

        const circleCount = 4;
        const spacing = isolationCanvas.width / (circleCount + 1);

        for (let i = 0; i < circleCount; i++) {
          const x = spacing * (i + 1);
          const baseY = isolationCanvas.height / 2;
          const offset = Math.sin(i * 0.8 + progress * 2) * 60;
          const y = baseY + offset;
          const radius = 40;

          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(226, 232, 240, ${0.6 + progress * 0.2})`;
          ctx.fill();
          ctx.strokeStyle = `rgba(100, 116, 139, ${0.4 + progress * 0.3})`;
          ctx.lineWidth = 2;
          ctx.stroke();

          // Draw failed connection lines that never meet
          if (i < circleCount - 1) {
            const nextX = spacing * (i + 2);
            const nextY = baseY + Math.sin((i + 1) * 0.8 + progress * 2) * 60;
            const midX = (x + nextX) / 2;
            const gapX = (nextX - x) * 0.15;

            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(midX - gapX, y + (nextY - y) * 0.5);
            ctx.strokeStyle = `rgba(148, 163, 184, ${0.3 + progress * 0.2})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      });
    };

    // Scene 2: Collaboration - Circles merge and form unified network
    const collaborationCanvas = document.getElementById('collaboration-canvas');
    const collaborationTg = collaborationCanvas.closest('ef-timegroup');
    
    collaborationTg.initializer = (instance) => {
      return instance.addFrameTask((info) => {
        const ctx = collaborationCanvas.getContext('2d');
        collaborationCanvas.width = collaborationCanvas.offsetWidth;
        collaborationCanvas.height = collaborationCanvas.offsetHeight;
        const progress = info.ownCurrentTimeMs / info.durationMs;

        ctx.clearRect(0, 0, collaborationCanvas.width, collaborationCanvas.height);

        const nodeCount = 5;
        const radius = 100;
        const centerX = collaborationCanvas.width / 2;
        const centerY = collaborationCanvas.height / 2;

        const nodes = [];
        for (let i = 0; i < nodeCount; i++) {
          const angle = (i / nodeCount) * Math.PI * 2;
          const x = centerX + Math.cos(angle) * radius * (1 - progress * 0.4);
          const y = centerY + Math.sin(angle) * radius * (1 - progress * 0.4);
          nodes.push({ x, y });
        }

        // Draw connecting lines that strengthen
        for (let i = 0; i < nodeCount; i++) {
          const nextI = (i + 1) % nodeCount;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[nextI].x, nodes[nextI].y);
          ctx.strokeStyle = `rgba(59, 130, 246, ${0.3 + progress * 0.5})`;
          ctx.lineWidth = 2 + progress * 2;
          ctx.stroke();
        }

        // Draw nodes that glow as they converge
        for (let i = 0; i < nodeCount; i++) {
          ctx.beginPath();
          ctx.arc(nodes[i].x, nodes[i].y, 30 + progress * 10, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(59, 130, 246, ${0.4 + progress * 0.3})`;
          ctx.fill();
          ctx.strokeStyle = `rgba(59, 130, 246, ${0.7 + progress * 0.3})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Center node that emerges
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20 * progress, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(59, 130, 246, ${progress * 0.8})`;
        ctx.fill();
      });
    };

    // Scene 3: Multiplayer - Cursors and avatars moving in real time
    const multiplayerCanvas = document.getElementById('multiplayer-canvas');
    const multiplayerTg = multiplayerCanvas.closest('ef-timegroup');
    
    multiplayerTg.initializer = (instance) => {
      return instance.addFrameTask((info) => {
        const ctx = multiplayerCanvas.getContext('2d');
        multiplayerCanvas.width = multiplayerCanvas.offsetWidth;
        multiplayerCanvas.height = multiplayerCanvas.offsetHeight;
        const progress = info.ownCurrentTimeMs / info.durationMs;

        ctx.clearRect(0, 0, multiplayerCanvas.width, multiplayerCanvas.height);

        const participants = 4;
        const centerX = multiplayerCanvas.width / 2;
        const centerY = multiplayerCanvas.height / 2;
        const radius = 120;

        for (let i = 0; i < participants; i++) {
          const angle = (i / participants) * Math.PI * 2 + progress * Math.PI * 2;
          const x = centerX + Math.cos(angle) * radius;
          const y = centerY + Math.sin(angle) * radius;

          // Cursor trail
          ctx.beginPath();
          ctx.arc(x, y, 8, 0, Math.PI * 2);
          ctx.fillStyle = `hsl(${(i * 90) % 360}, 70%, 60%, ${0.6})`;
          ctx.fill();

          // Velocity indicator
          const nextAngle = ((i / participants) * Math.PI * 2 + (progress + 0.01) * Math.PI * 2
