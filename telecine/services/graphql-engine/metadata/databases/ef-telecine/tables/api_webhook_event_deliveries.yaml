table:
  name: webhook_event_deliveries
  schema: api
object_relationships:
  - name: webhook_event
    using:
      foreign_key_constraint_on: webhook_event_id
select_permissions:
  - role: ef-admin
    permission:
      columns:
        - attempt_number
        - response_status
        - request_headers
        - response_headers
        - response_text
        - status
        - created_at
        - id
        - webhook_event_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: org-reader
    permission:
      columns:
        - attempt_number
        - response_status
        - request_headers
        - response_headers
        - response_text
        - status
        - created_at
        - id
        - webhook_event_id
      filter:
        webhook_event:
          api_key:
            org:
              memberships:
                _and:
                  - role:
                      _in:
                        - admin
                        - editor
                        - reader
                  - user_id:
                      _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
