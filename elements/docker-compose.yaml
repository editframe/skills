name: ef-elements
services:
  runner:
    build:
      context: .
    init: true
    env_file:
      - .env
    working_dir: /packages
    volumes:
      - ${ELEMENTS_ROOT_HOST:-${PWD}}:/packages
      - node_modules:/packages/node_modules
    stop_grace_period: 1s
    ports:
      - "63315:63315"
      - "8794:8794" # Record-replay proxy server
    command: ["sleep", "infinity"]

  dev-projects:
    build:
      context: .
    init: true
    env_file:
      - .env
    working_dir: /packages
    volumes:
      - ${ELEMENTS_ROOT_HOST:-${PWD}}:/packages
      - node_modules:/packages/node_modules
    stop_grace_period: 1s
    # Don't expose port directly - only accessible through Traefik
    expose:
      - "4321"
    command: ["sleep", "infinity"]
    networks:
      - default
      - traefik-shared
    labels:
      traefik.enable: true
      traefik.http.routers.elements-dev.rule: "Host(`${WORKTREE_DOMAIN}`)"
      traefik.http.routers.elements-dev.entrypoints: elements
      traefik.http.routers.elements-dev.service: elements-dev
      traefik.http.services.elements-dev.loadbalancer.server.port: 4321

  ci-runner:
    build:
      context: .
      dockerfile: Dockerfile.ci-runner
    init: true
    env_file:
      - .env
    working_dir: /packages
    volumes:
      - ${ELEMENTS_ROOT_HOST:-${PWD}}:/packages
      - node_modules:/packages/node_modules
    stop_grace_period: 1s
    ports:
      - "8795:8794" # Record-replay proxy server for CI (mapped to different host port)
      - "63315:63315" # Test server port for browser tests
    command: ["sleep", "infinity"]

volumes:
  node_modules:

networks:
  traefik-shared:
    name: telecine-traefik
    external: true
  default:
    name: ${WORKTREE_DOCKER_NETWORK_NAME:-ef-elements_default}
