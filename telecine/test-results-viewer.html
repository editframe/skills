<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Results - Video-Only Fidelity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.5;
        }
        
        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        
        .nav {
            background: #161b22;
            border-right: 1px solid #30363d;
            padding: 24px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .nav h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: #58a6ff;
        }
        
        .nav-section {
            margin-bottom: 24px;
        }
        
        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .nav-item {
            display: block;
            padding: 8px 12px;
            color: #c9d1d9;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.15s ease;
        }
        
        .nav-item:hover {
            background: #21262d;
            color: #58a6ff;
        }
        
        .nav-item.active {
            background: #1f6feb;
            color: #fff;
            font-weight: 600;
        }
        
        .content {
            padding: 40px;
            max-width: 1400px;
        }
        
        .result-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            scroll-margin-top: 20px;
        }
        
        .result-item h2 {
            font-size: 1.4rem;
            color: #58a6ff;
            margin-bottom: 8px;
        }
        
        .meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 15px 0;
            padding: 15px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px solid #21262d;
            font-size: 0.9rem;
        }
        
        .meta div {
            color: #8b949e;
        }
        
        video {
            width: 100%;
            max-width: 800px;
            border-radius: 6px;
            background: #000;
            margin: 15px 0;
            border: 1px solid #30363d;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 4px;
            margin: 16px 0;
        }
        
        .timestamp {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <h1>Test Results</h1>
            <div id="loading" style="padding: 20px; color: #8b949e;">Loading...</div>
        </nav>
        
        <main class="content">
            <div id="content-loading" style="padding: 40px; text-align: center; color: #8b949e;">
                <p>Loading test results...</p>
            </div>
        </main>
    </div>

    <script>
        async function loadTestResults() {
            try {
                const response = await fetch('lib/queues/units-of-work/Render/full-render/fidelity/video-only-test-results.json?' + Date.now());
                if (!response.ok) {
                    throw new Error(`Failed to load manifest: ${response.status}`);
                }
                
                const manifest = await response.json();
                
                // Update timestamp
                const timestampEl = document.createElement('div');
                timestampEl.className = 'timestamp';
                timestampEl.textContent = `Last run: ${new Date(manifest.timestamp).toLocaleString()}`;
                document.body.appendChild(timestampEl);
                
                // Update nav and content
                const nav = document.querySelector('.nav');
                const content = document.querySelector('.content');
                
                // Clear loading
                document.getElementById('loading').remove();
                document.getElementById('content-loading').remove();
                
                // Add baseline nav
                const baselineSection = document.createElement('div');
                baselineSection.className = 'nav-section';
                baselineSection.innerHTML = '<div class="nav-section-title">Baseline</div><div class="nav-items"></div>';
                const baselineItem = document.createElement('a');
                baselineItem.href = '#baseline';
                baselineItem.className = 'nav-item';
                baselineItem.textContent = manifest.baseline.label;
                baselineSection.querySelector('.nav-items').appendChild(baselineItem);
                nav.appendChild(baselineSection);
                
                // Add baseline content
                content.innerHTML += `
                    <div class="result-item" id="baseline">
                        <h2>${manifest.baseline.label}</h2>
                        <div class="meta">
                            <div>Template: ${manifest.baseline.templateHash}</div>
                            <div>Dimensions: ${manifest.baseline.renderInfo.width}x${manifest.baseline.renderInfo.height}</div>
                            <div>Duration: ${manifest.baseline.renderInfo.durationMs}ms</div>
                        </div>
                        <video src="${manifest.baseline.videoPath}" controls loop></video>
                    </div>
                `;
                
                // Add browser results
                const browserSection = document.createElement('div');
                browserSection.className = 'nav-section';
                browserSection.innerHTML = '<div class="nav-section-title">Browser Rendering</div><div class="nav-items"></div>';
                const browserItems = browserSection.querySelector('.nav-items');
                
                manifest.results.forEach((result, idx) => {
                    const navItem = document.createElement('a');
                    navItem.href = `#result-${idx}`;
                    navItem.className = 'nav-item';
                    navItem.textContent = result.label;
                    if (result.error) {
                        navItem.style.color = '#ff6b6b';
                    }
                    browserItems.appendChild(navItem);
                    
                    let resultHTML = `<div class="result-item" id="result-${idx}"><h2>${result.label}</h2>`;
                    
                    if (result.error) {
                        resultHTML += `<div class="error"><strong>Error:</strong> ${result.error}</div>`;
                    } else if (result.videoPath) {
                        resultHTML += `
                            <div class="meta">
                                <div>Template: ${result.templateHash || 'N/A'}</div>
                                <div>Dimensions: ${result.renderInfo?.width || 'N/A'}x${result.renderInfo?.height || 'N/A'}</div>
                                <div>Duration: ${result.renderInfo?.durationMs || 'N/A'}ms</div>
                                <div>Render Time: ${result.duration?.toFixed(0) || 'N/A'}ms</div>
                                <div>Size: ${result.sizeKB || 'N/A'} KB</div>
                            </div>
                            <video src="${result.videoPath}" controls loop></video>
                        `;
                    } else {
                        resultHTML += '<div style="color: #999; padding: 16px;">No output generated</div>';
                    }
                    
                    resultHTML += '</div>';
                    content.innerHTML += resultHTML;
                });
                
                nav.appendChild(browserSection);
                
                // Initialize scroll observer
                initializeScrollObserver();
                
            } catch (error) {
                document.body.innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <h1 style="color: #c62828;">Failed to Load Test Results</h1>
                        <p style="color: #666; margin-top: 20px;">${error.message}</p>
                        <p style="color: #999; margin-top: 10px; font-size: 14px;">
                            Make sure the test has been run and the manifest file exists at:<br>
                            <code>lib/queues/units-of-work/Render/full-render/fidelity/video-only-test-results.json</code>
                        </p>
                    </div>
                `;
            }
        }
        
        function initializeScrollObserver() {
            const navItems = document.querySelectorAll('.nav-item');
            const resultItems = document.querySelectorAll('.result-item');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        navItems.forEach(item => {
                            item.classList.toggle('active', item.getAttribute('href') === `#${id}`);
                        });
                    }
                });
            }, { threshold: 0.5 });
            
            resultItems.forEach(item => observer.observe(item));
        }
        
        loadTestResults();
    </script>
</body>
</html>
