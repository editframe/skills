table:
  name: files
  schema: video2
object_relationships:
  - name: api_key
    using:
      foreign_key_constraint_on: api_key_id
  - name: file_status
    using:
      foreign_key_constraint_on: status
  - name: file_type
    using:
      foreign_key_constraint_on: type
  - name: org
    using:
      foreign_key_constraint_on: org_id
  - name: user
    using:
      foreign_key_constraint_on: creator_id
insert_permissions:
  - role: org-editor
    permission:
      check:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
      set:
        api_key_id: x-hasura-api-key
        creator_id: x-hasura-User-Id
      columns:
        - byte_size
        - filename
        - height
        - id
        - md5
        - mime_type
        - org_id
        - type
        - width
    comment: ""
select_permissions:
  - role: ef-admin
    permission:
      columns:
        - api_key_id
        - byte_size
        - completed_at
        - created_at
        - creator_id
        - expires_at
        - filename
        - height
        - id
        - md5
        - mime_type
        - next_byte
        - org_id
        - remote_uri
        - status
        - type
        - width
      filter: {}
    comment: ""
  - role: org-admin
    permission:
      columns:
        - api_key_id
        - byte_size
        - completed_at
        - created_at
        - creator_id
        - expires_at
        - filename
        - height
        - id
        - md5
        - mime_type
        - org_id
        - status
        - type
        - width
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
                    - reader
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-editor
    permission:
      columns:
        - api_key_id
        - byte_size
        - completed_at
        - created_at
        - creator_id
        - expires_at
        - filename
        - height
        - id
        - md5
        - mime_type
        - next_byte
        - org_id
        - remote_uri
        - status
        - type
        - width
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-reader
    permission:
      columns:
        - byte_size
        - completed_at
        - created_at
        - creator_id
        - expires_at
        - filename
        - height
        - id
        - md5
        - mime_type
        - next_byte
        - org_id
        - status
        - type
        - width
      filter:
        org:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
      limit: 50
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: org-editor
    permission:
      columns:
        - byte_size
        - completed_at
        - height
        - md5
        - mime_type
        - next_byte
        - status
        - width
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
      check: null
    comment: ""
delete_permissions:
  - role: org-admin
    permission:
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
  - role: org-editor
    permission:
      filter:
        org:
          memberships:
            _and:
              - role:
                  _in:
                    - admin
                    - editor
              - user_id:
                  _eq: X-Hasura-User-Id
    comment: ""
event_triggers:
  - name: files_cleanup
    definition:
      delete:
        columns: '*'
      enable_manual: false
    retry_conf:
      interval_sec: 120
      num_retries: 3
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/delete_files'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
  - name: files_webhook
    definition:
      enable_manual: false
      insert:
        columns: '*'
      update:
        columns:
          - status
    retry_conf:
      interval_sec: 30
      num_retries: 3
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/webhook_create_event'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
