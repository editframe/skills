services:
  # Traefik is now managed at the monorepo root level
  # See /docker-compose.yaml for the shared Traefik configuration

  # autoheal:
  #   environment:
  #     AUTOHEAL_CONTAINER_LABEL: autoheal
  #   image: willfarrell/autoheal:latest
  #   network_mode: none
  #   restart: unless-stopped
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - /var/run/docker.sock:/var/run/docker.sock

  runner:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    restart: no
    environment:
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    working_dir: /app
    volumes:
      - ${TELECINE_ROOT_HOST:-${PWD}}:/app
      - node_modules:/app/node_modules
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ${ELEMENTS_PATH:-../elements}:/app/lib/packages
      - ${PWD}/../skills:/app/skills
    devices:
      - /dev/mps0:/dev/mps0
    privileged: true
    stop_grace_period: 1s
    command: ["sleep", "infinity"]
    # Expose port 4323 for test server (vitest browser tests)
    expose:
      - "4323"
    networks:
      - default
      - traefik-shared
    labels:
      traefik.enable: true
      # Test server uses its own Traefik entrypoint (port 4323) to avoid conflict with other services
      traefik.http.routers.telecine-test-${WORKTREE_ID:-main}.rule: "Host(`${WORKTREE_DOMAIN}`)"
      traefik.http.routers.telecine-test-${WORKTREE_ID:-main}.entrypoints: telecine-test
      traefik.http.routers.telecine-test-${WORKTREE_ID:-main}.service: telecine-test-${WORKTREE_ID:-main}
      traefik.http.services.telecine-test-${WORKTREE_ID:-main}.loadbalancer.server.port: 4323

  # playwright-runner:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.playwright.dev
  #     tags:
  #       - playwright-runner
  #   platform: linux/amd64
  #   pull_policy: never
  #   working_dir: /app
  #   volumes:
  #     - .:/app
  #     - node_modules_amd64:/app/node_modules
  #     - ${HOME}/.config/gcloud:/root/.config/gcloud
  #     - ../elements:/app/lib/packages
  #   stop_grace_period: 1s
  #   init: true
  #   command: ["sh", "-c", "npm install && sleep infinity"]

  # playwright-shell:
  #   image: playwright-runner
  #   depends_on:
  #     - playwright-runner
  #   working_dir: /app
  #   volumes_from:
  #     - playwright-runner
  #   command: "zsh"

volumes:
  node_modules:
  node_modules_amd64:

networks:
  traefik-shared:
    name: editframe-shared
    external: true
  default:
    name: ${WORKTREE_DOCKER_NETWORK_NAME:-telecine_default}
