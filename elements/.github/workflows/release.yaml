name: Auto Release and Publish
run-name: ${{ github.actor }} is releasing ${{ github.ref_name }}
on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Create .env file
        run: touch .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI Runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci-runner
          tags: ef-elements-ci-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Install Dependencies
        run: ./scripts/docker-compose run --rm ci-runner npm ci

      - name: Build All Packages
        run: ./scripts/build-all

      - name: Type Check
        if: "!contains(github.ref_name, 'beta')"
        run: ./scripts/docker-compose run --rm ci-runner npm run typecheck --workspaces

      - name: Lint
        run: ./scripts/docker-compose run --rm ci-runner npm run lint

      - name: Format Check
        run: ./scripts/docker-compose run --rm ci-runner npm run format

      - name: Run Node Tests
        if: "!contains(github.ref_name, 'beta')"
        run: ./scripts/docker-compose run --rm ci-runner npx vitest --config vitest.config.ts --run

      - name: Run Browser Tests
        if: "!contains(github.ref_name, 'beta')"
        run: ./scripts/docker-compose run --rm ci-runner npx vitest --config vitest.config.browser.ts --run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" == *"beta"* ]]; then
            NPM_TAG="beta"
          else
            NPM_TAG="latest"
          fi
          npm publish --tag "$NPM_TAG" --access public --provenance --workspaces

      - name: Generate TypeDoc
        run: |
          ./scripts/docker-compose run --rm ci-runner npm run typedoc \
            --workspace @editframe/api \
            --workspace @editframe/react \
            --workspace @editframe/elements \
            --workspace @editframe/assets

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" == *"beta"* ]]; then
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "Automated release for tag ${{ github.ref_name }}" \
              --prerelease
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "Automated release for tag ${{ github.ref_name }}"
          fi
