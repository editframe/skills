table:
  name: transcriptions
  schema: video2
object_relationships:
  - name: isobmff_track
    using:
      foreign_key_constraint_on:
        - track_id
        - file_id
  - name: org
    using:
      foreign_key_constraint_on: org_id
array_relationships:
  - name: fragments
    using:
      foreign_key_constraint_on:
        column: transcription_id
        table:
          name: transcription_fragments
          schema: video2
select_permissions:
  - role: org-reader
    permission:
      columns:
        - completed_at
        - created_at
        - creator_id
        - failed_at
        - file_id
        - id
        - org_id
        - status
        - track_id
        - updated_at
        - work_slice_ms
      filter:
        org:
          memberships:
            user_id:
              _eq: X-Hasura-User-Id
      limit: 50
      allow_aggregations: true
    comment: ""
event_triggers:
  - name: transcribe_track
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{HASURA_ACTION_ORIGIN}}/hdb/transcribe_audio_track'
    headers:
      - name: X-ACTION-SECRET
        value_from_env: ACTION_SECRET
