services:
  worker-render-finalizer:
    image: telecine-runner
    pull_policy: never
    env_file:
      - ${PWD}/.env
    depends_on:
      - runner
    working_dir: /app
    volumes_from:
      - runner
    environment:
      - SHELL=/bin/sh
      - OTEL_SERVICE_NAME=worker-render-finalizer
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    stop_grace_period: 1s
    init: true
    command:
      ["tsx", "--watch", "/app/services/worker-render-finalizer/server.ts"]
    networks:
      - default
      - editframe-shared
    deploy:
      resources:
        limits:
          cpus: ${WORKER_RENDER_FINALIZER_CPUS:-1}
          memory: ${WORKER_RENDER_FINALIZER_MEMORY:-2G}

networks:
  editframe-shared:
    name: editframe-shared
    external: true
